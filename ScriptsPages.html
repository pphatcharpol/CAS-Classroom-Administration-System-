<script id="sps-pages-script" type="text/x-sas-pages">
(function(){
  var $=A.$, $$=A.$$, esc=A.esc, num=A.num;
  function page(){return $('#page');}

  /* ── shared building blocks ───────────────────────────────── */
  function hero(o){
    var kpis=(o.kpis||[]).map(function(k){
      return '<div class="kpi"><div class="k-ic"><i class="bi bi-'+k.icon+'"></i></div><div class="k-val">'+k.value+'</div><div class="k-lbl">'+esc(k.label)+'</div>'+(k.sub?'<div class="k-sub">'+esc(k.sub)+'</div>':'')+'</div>';
    }).join('');
    return '<section class="hero"><div class="beam"></div><div class="hero-top"><div style="flex:1"><div class="hero-pill"><i class="bi bi-'+(o.pill_icon||'stars')+'"></i> '+esc(o.pill||'')+'</div><h1>'+esc(o.title)+'</h1><p>'+esc(o.sub||'')+'</p></div><div class="hero-deco"><i class="bi bi-'+(o.deco||'mortarboard-fill')+'"></i></div></div>'+(kpis?'<div class="hero-kpis">'+kpis+'</div>':'')+'</section>';
  }
  function statMini(ic,color,bg,v,l){
    return '<div class="stat-mini"><div class="ic" style="background:'+bg+';color:'+color+'"><i class="bi bi-'+ic+'"></i></div><div><div class="v">'+v+'</div><div class="l">'+esc(l)+'</div></div></div>';
  }
  // การ์ดสรุปโมดูล (แดชบอร์ดครู) — สอดคล้องฟีเจอร์ล่าสุด


  function attBadge(st){var m=(Store.boot.att_status||{})[st];if(!m)return '<span class="badge b-muted">—</span>';
    var cls={present:'b-ok',late:'b-warn',leave:'b-info',sick:'b-purple',absent:'b-danger',activity:'b-info'}[st]||'b-muted';
    return '<span class="badge '+cls+'"><i class="bi bi-'+m.icon+'"></i> '+esc(m.label)+'</span>';}
  function classOptions(sel){return (Store.__classes||[]).map(function(c){return '<option value="'+c.id+'"'+(c.id===sel?' selected':'')+'>'+esc(c.level+'/'+c.room)+'</option>';}).join('');}
  // cache รายชื่อชั้นเรียนฝั่ง client 90 วิ — สลับหน้าไม่ยิงซ้ำ (เร็วขึ้นมาก) · invClasses() ล้างเมื่อมีการแก้
  function loadClasses(force){
    if(!force&&Store.__classes&&Store.__classesAt&&(Date.now()-Store.__classesAt)<90000)return Promise.resolve(Store.__classes);
    return call('class.list',{}).then(function(d){Store.__classes=d.items;Store.__classesAt=Date.now();return d.items;});
  }
  function invClasses(){Store.__classesAt=0;}

  /* ── App launcher / quick actions / mission strip ── */
  var TILE_C=['c1','c2','c3','c4','c5','c6','c7','c8'];
  var QUICK_STAFF=[
    {h:'#/attendance',i:'calendar-check-fill',t:'เช็กชื่อ',cap:'attendance.record'},
    {h:'#/students',i:'people-fill',t:'นักเรียน',cap:'student.view'},
    {h:'#/calendar',i:'calendar-event-fill',t:'ปฏิทิน',cap:'event.view'},
    {h:'#/announcements',i:'megaphone-fill',t:'ประกาศ',cap:'announce.view'},
    {h:'#/reports',i:'bar-chart-fill',t:'รายงาน',cap:'report.view'}
  ];

  function quickGrid(){
    var list=QUICK_STAFF.filter(function(q){return !q.cap||can(q.cap);});
    return '<div class="quick-grid">'+list.map(function(q){return '<a class="quick-btn" href="'+q.h+'"><div class="qic"><i class="bi bi-'+q.i+'"></i></div><span>'+esc(q.t)+'</span></a>';}).join('')+'</div>';
  }
  function appLauncher(){
    var groups=navConfig();var ci=0;
    return groups.map(function(g){
      if(!g.items.length)return '';
      return '<div class="section-title"><i class="bi bi-collection-fill"></i> '+esc(g.label)+'</div><div class="app-grid mb">'+g.items.map(function(it){var c=TILE_C[(ci++)%8];return '<a class="app-tile '+c+'" href="'+it.h+'"><div class="ic"><i class="bi bi-'+it.i+'"></i></div><div class="lb">'+esc(it.t)+'</div></a>';}).join('')+'</div>';
    }).join('');
  }
  function missionCards(arr){
    return '<div class="grid stagger" style="grid-template-columns:repeat(auto-fit,minmax(258px,1fr));margin-bottom:16px">'+arr.map(function(x){return '<a class="mission '+x.type+'" href="'+x.h+'"><div class="mic"><i class="bi bi-'+x.icon+'"></i></div><div class="grow"><b>'+esc(x.title)+'</b><small>'+esc(x.sub)+'</small></div><i class="bi bi-chevron-right muted"></i></a>';}).join('')+'</div>';
  }
  function staffMissions(d){
    var m=[];
    var pov=(d.visit&&d.visit.poverty)?((d.visit.poverty.poor||0)+(d.visit.poverty.extreme_poor||0)):0;
    if(pov)m.push({type:'danger',icon:'house-exclamation',title:'นักเรียนยากจน/ยากจนพิเศษ '+pov+' คน',sub:'เยี่ยมบ้าน · ขอรับเงินอุดหนุน กสศ.',h:'#/visits'});
    if(!m.length)m.push({type:'ok',icon:'check-circle-fill',title:'ทุกอย่างเรียบร้อยดี',sub:'ไม่มีรายการเร่งด่วนที่ต้องดำเนินการ',h:'#/dashboard'});
    return missionCards(m);
  }
  // app launcher route (โดยเฉพาะมือถือ — เปิดจาก bottom nav "เมนู")
  Routes['#/menu']=function(){
    setTitle('เมนู','เมนูทั้งหมด');
    page().innerHTML=hero({pill:greeting()+' · '+Store.user.full_name,pill_icon:'grid-fill',title:'เมนูทั้งหมด',sub:'เลือกเมนูที่ต้องการใช้งาน',deco:'grid-3x3-gap-fill',kpis:[]})+'<div class="stagger">'+appLauncher()+'</div>';
  };

  /* ════════════════ DASHBOARD ════════════════════════════════ */
  Routes['#/dashboard']=function(){
    setTitle('แดชบอร์ด','ภาพรวมระบบ');
    call('dash.summary',{}).then(function(d){
      renderStaffDash(d);
    }).catch(function(e){page().innerHTML=A.empty('exclamation-octagon','โหลดข้อมูลไม่สำเร็จ',e.message);});
  };

  function renderStaffDash(d){
    var k=d.kpi||{};var att=d.attendance||{};var vis=d.visit||{};
    var u=Store.user;
    var kpis=[
      {icon:'people-fill',value:num(k.students),label:'นักเรียนทั้งหมด',sub:'ชาย '+num(k.male)+' · หญิง '+num(k.female)},
      {icon:'door-open-fill',value:num(k.classes),label:'ชั้นเรียน'},
      {icon:'calendar-check-fill',value:att.presentRate+'%',label:'อัตรามาเรียน',sub:'30 วันล่าสุด'}
    ];
    if(u.role==='admin')kpis.push({icon:'person-badge-fill',value:num(k.teachers),label:'ครู/บุคลากร'});
 
    if(d.visit&&d.visit.poverty&&(d.visit.poverty.poor||d.visit.poverty.extreme_poor))kpis.push({icon:'house-heart-fill',value:num((d.visit.poverty.poor||0)+(d.visit.poverty.extreme_poor||0)),label:'นักเรียนยากจน (กสศ.)'});

    var attSegs=[
      {label:'มาเรียน',color:'#2E7D32',value:att.byStatus?att.byStatus.present:0},
      {label:'มาสาย',color:'#C9A227',value:att.byStatus?att.byStatus.late:0},
      {label:'ลากิจ',color:'#1565C0',value:att.byStatus?att.byStatus.leave:0},
      {label:'ลาป่วย',color:'#6A1B9A',value:att.byStatus?att.byStatus.sick:0},
      {label:'ขาดเรียน',color:'#C62828',value:att.byStatus?att.byStatus.absent:0}
    ];
    var trend=(att.trend||[]).map(function(t){return {label:TH.date(t.date).split(' ').slice(0,2).join(' '),value:t.rate,suffix:'%'};});
    var annHtml=(d.announcements||[]).slice(0,4).map(annRow).join('')||'<div class="muted center" style="padding:18px">ยังไม่มีประกาศ</div>';

    page().innerHTML=hero({pill:greeting()+' · '+u.full_name,pill_icon:'hand-thumbs-up-fill',title:'แดชบอร์ด '+(u.role==='admin'?'ผู้บริหาร':'ครู'),sub:'ภาพรวมงานธุรการชั้นเรียน ปีการศึกษา '+(Store.boot.settings?Store.boot.settings.academic_year:''),deco:'speedometer2',kpis:kpis})
    +staffMissions(d)
    +'<div class="card mb"><div class="card-h"><h3><i class="bi bi-lightning-charge-fill"></i> ทางลัด</h3></div>'+quickGrid()+'</div>'
    +'<div class="grid stagger" style="grid-template-columns:1.4fr 1fr;align-items:start;margin-bottom:16px">'
      +'<div class="card"><div class="card-h"><h3><i class="bi bi-graph-up-arrow"></i> แนวโน้มการมาเรียน (14 วัน)</h3></div>'+(trend.length?A.bars(trend):A.empty('calendar-x','ยังไม่มีข้อมูล','เริ่มเช็กชื่อเพื่อดูแนวโน้ม'))+'</div>'
      +'<div class="card"><div class="card-h"><h3><i class="bi bi-pie-chart-fill"></i> สัดส่วนการมาเรียน</h3></div><div class="flex items-center gap" style="gap:18px"><div>'+A.donut(attSegs,150)+'</div><div class="legend grow">'+attSegs.map(function(s){return '<div class="lg-row"><span class="dot" style="background:'+s.color+'"></span>'+esc(s.label)+'<span class="lg-v">'+num(s.value)+'</span></div>';}).join('')+'</div></div></div>'
    +'</div>'
    +((d.events&&d.events.length)?'<div class="grid stagger" style="grid-template-columns:1fr 1fr;align-items:start;margin-bottom:16px">'+eventsCard(d.events)+'</div>':'')
    +'<div class="grid stagger" style="grid-template-columns:1fr;align-items:start;margin-bottom:16px">'
      +'<div class="card"><div class="card-h"><h3><i class="bi bi-megaphone-fill"></i> ประกาศล่าสุด</h3><button class="btn btn-sm btn-ghost" data-go="#/announcements">ทั้งหมด</button></div>'+annHtml+'</div>'
    +'</div>'
    +'<div class="card"><div class="card-h"><h3><i class="bi bi-grid-3x3-gap-fill"></i> ชั้นเรียน</h3><button class="btn btn-sm btn-ghost" data-go="#/students">ดูนักเรียน</button></div><div class="cards">'
      +(d.classes||[]).map(function(c){return '<div class="card hover" data-go="#/students?class='+c.id+'" style="padding:15px;border-left:4px solid '+(c.color||'#C9A227')+'"><div class="flex between items-center"><b style="font-family:var(--font);font-size:17px">'+esc(c.level+'/'+c.room)+'</b><span class="badge b-gold">'+c.student_count+' คน</span></div><div class="muted" style="font-size:12.5px;margin-top:6px"><i class="bi bi-person-badge"></i> '+esc(c.homeroom_name)+'</div></div>';}).join('')
    +'</div></div>';
  }

  /* ════════════════ STUDENTS ════════════════════════════════ */
  var stState={q:'',class_id:'',gender:'',view:'cards',page:1};
  Routes['#/students']=function(q){
    setTitle('นักเรียน','ทะเบียนข้อมูลนักเรียน');
    if(q&&q.class){stState.class_id=q.class;}
    loadClasses().then(function(){renderStudentsShell();loadStudents();});
  };
  function renderStudentsShell(){
    page().innerHTML=hero({pill:'งานทะเบียน',pill_icon:'people-fill',title:'ข้อมูลนักเรียน',sub:'ค้นหา จัดการ และดูประวัตินักเรียนรายบุคคล',deco:'people-fill',kpis:[]})
    +'<div class="toolbar"><div class="search"><i class="bi bi-search"></i><input id="st-q" placeholder="ค้นหา ชื่อ / นามสกุล / รหัส / ชื่อเล่น" value="'+esc(stState.q)+'"></div>'
    +'<select class="tb-select" id="st-class"><option value="">ทุกชั้นเรียน</option>'+classOptions(stState.class_id)+'</select>'
    +'<select class="tb-select" id="st-gender"><option value="">ทุกเพศ</option><option value="male">ชาย</option><option value="female">หญิง</option></select>'
    +'<div class="view-toggle"><button id="st-cards" class="'+(stState.view==='cards'?'active':'')+'"><i class="bi bi-grid-3x3-gap-fill"></i></button><button id="st-table" class="'+(stState.view==='table'?'active':'')+'"><i class="bi bi-list-ul"></i></button></div>'
    +(can('student.manage')?'<button class="btn btn-soft" id="st-import"><i class="bi bi-file-earmark-spreadsheet"></i> นำเข้า Excel</button><button class="btn btn-primary" id="st-add"><i class="bi bi-plus-lg"></i> เพิ่มนักเรียน</button>':'')+'</div>'
    +'<div id="st-list"></div>';
    var deb;
    $('#st-q').addEventListener('input',function(){clearTimeout(deb);var v=this.value;deb=setTimeout(function(){stState.q=v;stState.page=1;loadStudents();},300);});
    $('#st-class').addEventListener('change',function(){stState.class_id=this.value;stState.page=1;loadStudents();});
    $('#st-gender').addEventListener('change',function(){stState.gender=this.value;stState.page=1;loadStudents();});
    $('#st-cards').addEventListener('click',function(){stState.view='cards';renderStudentsShell();loadStudents();});
    $('#st-table').addEventListener('click',function(){stState.view='table';renderStudentsShell();loadStudents();});
    if($('#st-add'))$('#st-add').addEventListener('click',function(){openStudentForm(null);});
    if($('#st-import'))$('#st-import').addEventListener('click',function(){openStudentImport();});
  }

  /* ── นำเข้านักเรียนจาก Excel/CSV + แม่แบบ ── */
  var IMPORT_MAP=[
    [/เลขประจำตัว|รหัสนักเรียน|student.?code/i,'student_code'],
    [/บัตรประชาชน|id.?card/i,'id_card'],
    [/คำนำหน้า|title/i,'title'],
    [/ชื่อเล่น|nickname/i,'nickname'],
    [/ชื่อผู้ปกครอง|parent.?name/i,'parent_name'],
    [/นามสกุล|last.?name|surname/i,'last_name'],
    [/ชื่อ(?!ผู้ปกครอง)|first.?name/i,'first_name'],
    [/ชั้น|ห้อง|class|room/i,'class'],
    [/เลขที่|number|^no/i,'number'],
    [/เพศ|gender|sex/i,'gender'],
    [/วันเกิด|เกิด|birth/i,'birthdate'],
    [/กรุ๊ป|เลือด|blood/i,'blood_type'],
    [/ที่อยู่|address/i,'address'],
    [/ความเกี่ยวข้อง|ความสัมพันธ์|relation/i,'parent_relation'],
    [/เบอร์ผู้ปกครอง|parent.?phone/i,'parent_phone'],
    [/เบอร์|โทร|phone|tel/i,'phone']
  ];
  function mapHeader(h){h=String(h||'').trim();for(var i=0;i<IMPORT_MAP.length;i++){if(IMPORT_MAP[i][0].test(h))return IMPORT_MAP[i][1];}return null;}
  function parseCSV(text){
    text=String(text).replace(/^﻿/,'');var rows=[],row=[],cur='',q=false;
    for(var i=0;i<text.length;i++){var ch=text[i];
      if(q){if(ch==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}
      else{if(ch==='"')q=true;else if(ch===','){row.push(cur);cur='';}else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';}else if(ch!=='\r')cur+=ch;}
    }
    if(cur!==''||row.length){row.push(cur);rows.push(row);}
    return rows.filter(function(r){return r.some(function(c){return String(c).trim()!=='';});});
  }
  function loadXLSX(){if(window.XLSX)return Promise.resolve();return new Promise(function(res,rej){var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';s.onload=function(){res();};s.onerror=function(){rej(new Error('โหลดตัวอ่าน Excel ไม่สำเร็จ — ลองใช้ไฟล์ .csv แทน'));};document.body.appendChild(s);});}
  function downloadStudentTemplate(){
    var cls=(Store.__classes&&Store.__classes[0])?(Store.__classes[0].level+'/'+Store.__classes[0].room):'ม.1/1';
    var headers=['เลขประจำตัว*','คำนำหน้า','ชื่อ*','นามสกุล*','ชื่อเล่น','ชั้น (เช่น ม.1/1)*','เลขที่','เพศ (ชาย/หญิง)','วันเกิด (yyyy-mm-dd)','เลขบัตรประชาชน','กรุ๊ปเลือด','ที่อยู่','เบอร์โทร','ชื่อผู้ปกครอง','ความเกี่ยวข้อง','เบอร์ผู้ปกครอง'];
    var ex1=['25690001','ด.ช.','สมชาย','ใจดี','ชาย',cls,'1','ชาย','2558-05-01','1234567890123','O','123 หมู่ 1','0812345678','นางสมหญิง ใจดี','มารดา','0898765432'];
    var ex2=['25690002','ด.ญ.','สมหญิง','รักเรียน','หญิง',cls,'2','หญิง','2558-08-12','','B','','','นายสมศักดิ์ รักเรียน','บิดา','0876543210'];
    var csv='﻿'+[headers,ex1,ex2].map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\r\n');
    var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='แม่แบบนำเข้านักเรียน.csv';document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(a.href);},1500);
  }
  function classLabelSet(){var set={};(Store.__classes||[]).forEach(function(c){set[(c.level+'/'+c.room).replace(/\s/g,'')]=true;});return set;}
  function openStudentImport(){
    A.modal({size:'lg',html:
      '<div class="modal-head grad"><div class="mh-ic"><i class="bi bi-file-earmark-spreadsheet"></i></div><h3>นำเข้านักเรียนจาก Excel/CSV</h3><button class="modal-x" data-close><i class="bi bi-x-lg"></i></button></div>'
      +'<div class="modal-body">'
      +'<div class="card mb" style="background:var(--cream-2)"><b style="font-family:var(--font)"><i class="bi bi-info-circle"></i> วิธีใช้</b><ol class="muted" style="font-size:13px;margin:8px 0 0 18px;line-height:1.8"><li>ดาวน์โหลดแม่แบบ แล้วกรอกข้อมูล (ช่องมี * จำเป็น)</li><li>ชั้นเรียนต้องตรงกับที่มีในระบบ เช่น <b>ป.4/1</b></li><li>บันทึกเป็น .csv หรือ .xlsx แล้วอัปโหลดกลับ</li><li>ระบบสร้างบัญชีนักเรียนให้อัตโนมัติ (user/รหัส = เลขประจำตัว)</li></ol></div>'
      +'<div class="flex gap wrap mb"><button class="btn btn-soft" id="im-tpl"><i class="bi bi-download"></i> ดาวน์โหลดแม่แบบ CSV</button>'
      +'<label class="btn btn-ghost" style="cursor:pointer"><i class="bi bi-upload"></i> เลือกไฟล์ (.csv/.xlsx)<input type="file" id="im-file" accept=".csv,.xlsx,.xls" class="hide"></label></div>'
      +'<div id="im-preview"></div></div>'
      +'<div class="modal-foot"><button class="btn btn-ghost" data-close>ปิด</button><button class="btn btn-primary" data-state="idle" id="im-go" disabled><span class="st st-idle"><i class="bi bi-check-lg"></i> นำเข้า</span></button></div>',
      onMount:function(bd){
        var parsed=[];
        $('#im-tpl',bd).addEventListener('click',downloadStudentTemplate);
        $('#im-file',bd).addEventListener('change',function(e){
          var file=e.target.files[0];if(!file)return;
          $('#im-preview',bd).innerHTML='<div class="center muted" style="padding:18px"><span class="spin-inline" style="border-color:var(--gold-3);border-top-color:var(--gold)"></span> กำลังอ่านไฟล์…</div>';
          var ext=(file.name.split('.').pop()||'').toLowerCase();
          var done=function(matrix){
            var headers=(matrix[0]||[]).map(mapHeader);
            var data=matrix.slice(1).map(function(r,ri){var o={__line:ri+2};headers.forEach(function(f,ci){if(f)o[f]=String(r[ci]==null?'':r[ci]).trim();});return o;});
            parsed=data;renderPreview();
          };
          if(ext==='csv'){var rd=new FileReader();rd.onload=function(){done(parseCSV(rd.result));};rd.readAsText(file,'UTF-8');}

  function wireStudentClicks(){$$('[data-sid]').forEach(function(el){el.addEventListener('click',function(){openStudentDetail(el.dataset.sid);});});}
  function pager(d){
    if(!d.total||d.total<=d.size)return '';
    var pages=Math.ceil(d.total/d.size);var cur=d.page;var html='<div class="pagination"><button '+(cur<=1?'disabled':'')+' data-pg="'+(cur-1)+'"><i class="bi bi-chevron-left"></i></button>';
    for(var i=1;i<=pages;i++){if(i===1||i===pages||Math.abs(i-cur)<=1){html+='<button class="'+(i===cur?'active':'')+'" data-pg="'+i+'">'+i+'</button>';}else if(Math.abs(i-cur)===2){html+='<span class="muted">…</span>';}}
    html+='<button '+(cur>=pages?'disabled':'')+' data-pg="'+(cur+1)+'"><i class="bi bi-chevron-right"></i></button></div>';
    setTimeout(function(){$$('[data-pg]').forEach(function(b){b.addEventListener('click',function(){stState.page=+b.dataset.pg;loadStudents();});});},0);
    return html;
  }

  function loadRoster(){
    $('#at-roster').innerHTML=A.skeletonCards(6);
    call('att.sheet',{class_id:atState.class_id,date:atState.date}).then(function(d){
      Store.__roster=d.students;

      var statuses=Store.boot.att_status||{};
      var head='<div class="card mb"><div class="flex between items-center wrap gap"><div><b style="font-family:var(--font);font-size:16px">'+esc(d.class_label)+'</b> <span class="muted">· '+TH.dateLongWeekday(d.date)+'</span></div><div id="at-counts" class="flex gap-sm wrap"></div></div></div>';
      var rows=d.students.map(function(s){
        var btns=Object.keys(statuses).map(function(st){var m=statuses[st];return '<button class="att-btn btn btn-sm btn-ghost" data-st="'+st+'" data-for="'+s.student_id+'" style="--c:'+m.color+'" title="'+esc(m.label)+'"><i class="bi bi-'+m.icon+'"></i><span class="hide-sm"> '+esc(m.label)+'</span></button>';}).join('');
        return '<div class="card" data-sid="'+s.student_id+'" data-current="'+(s.status||'')+'" style="padding:13px 15px"><div class="flex items-center gap wrap"><span class="muted" style="font-family:var(--font);min-width:28px">'+esc(s.number)+'</span>'+A.avatar(s.photo_url,s.full_name,40)+'<div class="grow" style="min-width:130px"><b style="font-family:var(--font);font-size:14.5px">'+esc(s.full_name)+'</b><div class="muted" style="font-size:12px">'+esc(s.nickname||s.student_code)+'</div></div><div class="att-btns flex gap-sm wrap">'+btns+'</div></div></div>';
      }).join('');
      $('#at-roster').innerHTML=head+'<div class="grid" style="gap:10px">'+rows+'</div>';
      d.students.forEach(function(s){if(s.status)setRosterStatus(s.student_id,s.status,true);});

  function setRosterStatus(sid,st,silent){
    var row=$('[data-sid="'+sid+'"]');if(!row)return;row.dataset.current=st;
    var statuses=Store.boot.att_status||{};var color=(statuses[st]||{}).color||'#C9A227';
    $$('.att-btn[data-for="'+sid+'"]',row).forEach(function(b){var on=b.dataset.st===st;b.style.background=on?color:'';b.style.color=on?'#fff':'';b.style.borderColor=on?color:'';});
    if(!silent)updateAttCounts();
  }
  function updateAttCounts(){
    var statuses=Store.boot.att_status||{};var c={};var done=0;
    $$('[data-sid][data-current]').forEach(function(r){var s=r.dataset.current;if(s){c[s]=(c[s]||0)+1;done++;}});
    var host=$('#at-counts');if(!host)return;
    host.innerHTML='<span class="badge b-muted">บันทึกแล้ว '+done+'/'+($$('[data-sid][data-current]').length)+'</span>'+Object.keys(c).map(function(s){return attBadge(s).replace('</span>',' '+c[s]+'</span>');}).join('');
  }
  function saveAttendance(){
    var btn=$('#at-save');
    var noteMap={};(Store.__roster||[]).forEach(function(s){noteMap[s.student_id]=s.note||'';}); // คงหมายเหตุเดิม (เช่น ลาออนไลน์)
    var records=$$('[data-sid][data-current]').map(function(r){return {student_id:r.dataset.sid,status:r.dataset.current,note:noteMap[r.dataset.sid]};}).filter(function(r){return r.status;});
    if(!records.length){A.err('ยังไม่มีการเช็กชื่อ','');return;}
    A.submit(btn,'loading');
    call('att.save',{class_id:atState.class_id,date:atState.date,records:records}).then(function(d){A.submit(btn,'success');A.ok('บันทึกสำเร็จ','เพิ่ม '+d.inserted+' · แก้ไข '+d.updated+' รายการ');loadRoster();}).catch(function(e){A.submit(btn,'error');A.err('ผิดพลาด',e.message);});
  }

      return '<div class="card hover" data-ann="'+a.id+'">'+(a.cover_url?'<img src="'+esc(a.cover_url)+'" style="width:calc(100% + 36px);margin:-18px -18px 14px;border-radius:18px 18px 0 0;height:140px;object-fit:cover">':'')

      +fld('ชื่อ-นามสกุล *','uf-name',u.full_name)+fld('อีเมล','uf-email',u.email)
      +fld('เบอร์โทร','uf-phone',u.phone)

      onMount:function(bd){

      }
    });

  /* ════════════════ บริหารห้องเรียน (ชุด C) ═════════════════ */
  function cmMeta(){return Store.__cmMeta||{weekdays:[],periods:[],positions:[],lunch_after:4};}
  function wdLabel(v){var w=cmMeta().weekdays.filter(function(x){return x.v==v;})[0];return w?w.label:v;}
  function loadCmMeta(){return Store.__cmMeta?Promise.resolve(Store.__cmMeta):call('classroom.meta',{}).then(function(m){Store.__cmMeta=m;return m;});}
  function classLabelOf(id){var c=(Store.__classes||[]).filter(function(x){return x.id===id;})[0];return c?(c.level+'/'+c.room):'';}
  function classLevelOf(id){var c=(Store.__classes||[]).filter(function(x){return x.id===id;})[0];return c?c.level:'';}

/* ════════════════ ตารางเรียน (Liquid Glass UI) ═════════════════ */
  var ttState={class_id:'',term:'1',year:''};
  
  Routes['#/timetable']=function(){
    setTitle('ตารางเรียน','ตารางเรียนประจำห้อง');
    Promise.all([loadCmMeta(), loadClasses()]).then(function(){
      if(!ttState.class_id && Store.__classes.length) ttState.class_id=Store.__classes[0].id;
      // ตั้งค่าปีการศึกษาอัตโนมัติ
      ttState.year = ttState.year || (Store.boot.settings ? Store.boot.settings.academic_year : new Date().getFullYear()+543);
      
      var edit = can('classroom.manage');
      page().innerHTML=hero({pill:'บริหารห้องเรียน',pill_icon:'calendar3-week-fill',title:'ตารางเรียน',sub:'จัดตารางเรียนรายคาบ',deco:'calendar3-week',kpis:[]})
      +'<div class="toolbar"><select class="tb-select" id="tt-class">'+classOptions(ttState.class_id)+'</select>'
      +'<select class="tb-select" id="tt-term"><option value="1" '+(ttState.term==='1'?'selected':'')+'>เทอม 1</option><option value="2" '+(ttState.term==='2'?'selected':'')+'>เทอม 2</option></select>'
      +'<input type="number" class="tb-select" id="tt-year" value="'+ttState.year+'" style="width:104px">'
      +'<div class="grow"></div>'
      +'<button class="btn btn-soft" id="tt-print"><i class="bi bi-printer"></i> พิมพ์</button>'
      +(edit?'<button class="btn btn-primary" id="tt-save" data-state="idle"><span class="st st-idle"><i class="bi bi-save"></i> บันทึกตาราง</span></button>':'')+'</div>'
      +'<div class="card"><div id="tt-grid" class="tt-wrap" style="overflow-x: auto;"></div></div>';
      
      $('#tt-class').addEventListener('change',function(){ttState.class_id=this.value;loadTimetable();});
      $('#tt-term').addEventListener('change',function(){ttState.term=this.value;loadTimetable();});
      $('#tt-year').addEventListener('change',function(){ttState.year=this.value;loadTimetable();});
      $('#tt-print').addEventListener('click',function(){printTimetable();});
      if($('#tt-save')) $('#tt-save').addEventListener('click', saveTimetable);
      
      loadTimetable();
    });
  };

  function loadTimetable(){
    $('#tt-grid').innerHTML=A.skeletonCards(2);
    call('timetable.get',{class_id: ttState.class_id}).then(function(r){
      Store.__ttGrid = {};
      // จัดรูปแบบข้อมูลที่ได้มาจาก Backend ให้อยู่ในรูปแบบ key = weekday-period
      (r.items || []).forEach(function(item){
        Store.__ttGrid[item.weekday + '-' + item.period] = item;
      });
      renderTimetableGrid();
    }).catch(function(e){ $('#tt-grid').innerHTML=A.empty('exclamation-octagon','ผิดพลาด',e.message); });
  }

  function renderTimetableGrid(){
    var edit = can('classroom.manage');
    var WEEKDAYS5 = [{v:1, l:'จันทร์'},{v:2, l:'อังคาร'},{v:3, l:'พุธ'},{v:4, l:'พฤหัสบดี'},{v:5, l:'ศุกร์'}];
    var PERIODS = [1, 2, 3, 4, 5, 6, 7, 8];

    var html = '<div class="tt-liquid-grid">';
    
    // สร้างหัวตาราง (แถวบนสุด)
    html += '<div class="glass-cell head"></div>';
    PERIODS.forEach(function(p){ html += '<div class="glass-cell head">คาบ '+p+'</div>'; });

    // สร้างช่องตาราง วัน x คาบ
    WEEKDAYS5.forEach(function(day){
      html += '<div class="glass-cell day">'+day.l+'</div>';
      PERIODS.forEach(function(p){
        var key = day.v + '-' + p;
        var c = Store.__ttGrid[key] || {};
        
        if(edit) {
          html += '<div class="glass-cell input-cell">'
               + '<input type="text" class="tt-in subj" placeholder="วิชา" id="subj-'+key+'" value="'+esc(c.subject_text||'')+'">'
               + '<input type="text" class="tt-in teach" placeholder="ครูผู้สอน" id="teach-'+key+'" value="'+esc(c.teacher_text||'')+'">'
               + '</div>';
        } else {
          html += '<div class="glass-cell display-cell" style="text-align:center;">'
               + '<b style="color:var(--navy);font-family:var(--font);font-size:14px;display:block;">'+esc(c.subject_text||'-')+'</b>'
               + '<small style="color:var(--muted);font-size:11.5px;">'+esc(c.teacher_text||'')+'</small>'
               + '</div>';
        }
      });
    });

    html += '</div>';
    $('#tt-grid').innerHTML = html;
  }

  function saveTimetable(){
    var btn = $('#tt-save');
    var cells = [];
    var WEEKDAYS5 = [1,2,3,4,5];
    var PERIODS = [1,2,3,4,5,6,7,8];

    WEEKDAYS5.forEach(function(d){
      PERIODS.forEach(function(p){
        var key = d + '-' + p;
        var subj = $('#subj-'+key);
        var teach = $('#teach-'+key);
        if(subj && teach) {
          if(subj.value.trim() || teach.value.trim()){
            cells.push({
              weekday: d, period: p,
              subject_text: subj.value.trim(),
              teacher_text: teach.value.trim()
            });
          }
        }
      });
    });

    A.submit(btn, 'loading');
    call('timetable.save', { 
      class_id: ttState.class_id, 
      term: ttState.term, 
      year: ttState.year, 
      cells: cells 
    }).then(function(){
      A.submit(btn, 'success');
      A.ok('บันทึกสำเร็จ', 'อัปเดตตารางเรียนเรียบร้อยแล้ว');
      loadTimetable();
    }).catch(function(e){
      A.submit(btn, 'error');
      A.err('บันทึกไม่สำเร็จ', e.message);
    });
  }

  function printTimetable(){
    // ใช้ฟังก์ชันพิมพ์เดิมของคุณครูได้เลยเพราะโครงสร้างดีอยู่แล้ว
    var m = cmMeta(); var g = Store.__ttGrid || {};
    var head = '<tr><th class="pr-c">คาบ/วัน</th>'+m.weekdays.map(function(w){return '<th class="pr-c">'+esc(w.label)+'</th>';}).join('')+'</tr>';
    var body = '';
    m.periods.forEach(function(per){
      body += '<tr><th class="pr-c">'+per.p+'<br><span style="font-weight:400;font-size:10px">'+per.time+'</span></th>'+m.weekdays.map(function(w){
        var c = g[w.v+'-'+per.p];
        return '<td class="pr-c">'+(c?('<b>'+esc(c.subject_text)+'</b>'+(c.teacher_text?'<br>'+esc(c.teacher_text):'')):'-')+'</td>';
      }).join('')+'</tr>';
      if(per.p === m.lunch_after) body += '<tr><td colspan="'+(m.weekdays.length+1)+'" class="pr-c" style="background:#FBF5E3">พักกลางวัน</td></tr>';
    });
    A.printDoc({orientation:'landscape',pill:'ตารางเรียน',title:'ตารางเรียนประจำห้อง',subtitle:'ชั้น '+classLabelOf(ttState.class_id)+' · ภาคเรียนที่ '+ttState.term+'/'+$('#tt-year').value,docNo:'TT-'+classLabelOf(ttState.class_id),watermark:'ตารางเรียน',content:'<table class="pr-table">'+head+body+'</table>',signatures:[{role:'ครูประจำชั้น'},{role:'หัวหน้าวิชาการ'},{role:'ผู้อำนวยการ'}]});
  }

  /* ════════════════ กิจกรรม / กิจกรรม / ปฏิทิน (ชุด D) ══ */
  function loadExMeta(){return Store.__exMeta?Promise.resolve(Store.__exMeta):call('extra.meta',{}).then(function(m){Store.__exMeta=m;return m;});}
  function eventDateBlock(dateStr,color){var d=TH.parse(dateStr);if(!(d instanceof Date))d=new Date();return '<div style="width:48px;text-align:center;flex-shrink:0"><div style="font-family:var(--font);font-weight:800;font-size:19px;color:'+(color||'#8A6608')+'">'+d.getDate()+'</div><div class="muted" style="font-size:10px">'+TH.MONTHS_SHORT[d.getMonth()]+' '+(d.getFullYear()+543).toString().slice(-2)+'</div></div>';}
  function eventRow(e){return '<div class="flex items-center gap" style="padding:9px 0;border-bottom:1px solid var(--cream-3)">'+eventDateBlock(e.event_date,e.type_color)+'<div class="grow" style="min-width:0"><b style="font-family:var(--font);font-size:13.5px">'+esc(e.title)+'</b><div class="muted" style="font-size:11.5px"><span class="badge" style="background:'+(e.type_color||'#8A6608')+'22;color:'+(e.type_color||'#8A6608')+'">'+esc(e.type_label)+'</span>'+(e.time?' · '+esc(e.time)+' น.':'')+(e.location?' · '+esc(e.location):'')+'</div></div></div>';}
  function eventsCard(events){
    return '<div class="card"><div class="card-h"><h3><i class="bi bi-calendar-event-fill"></i> กิจกรรมที่จะถึง</h3><button class="btn btn-sm btn-ghost" data-go="#/calendar">ทั้งหมด</button></div>'+((events&&events.length)?events.map(eventRow).join(''):A.empty('calendar','ยังไม่มีกิจกรรมเร็ว ๆ นี้',''))+'</div>';
  }
  /* ── ปฏิทินกิจกรรม ── */
  function eventCardBig(e){

    return '<div class="card'+(edit?' hover':'')+'"'+(edit?' data-ev="'+e.id+'"':'')+' style="border-left:4px solid '+(e.type_color||'#8A6608')+'"><div class="flex items-center gap">'+eventDateBlock(e.event_date,e.type_color)+'<div class="grow" style="min-width:0"><b style="font-family:var(--font);font-size:15px">'+esc(e.title)+'</b><div class="muted" style="font-size:12px;margin-top:2px"><span class="badge" style="background:'+(e.type_color||'#8A6608')+'22;color:'+(e.type_color||'#8A6608')+'">'+esc(e.type_label)+'</span>'+(e.time?' · '+esc(e.time)+' น.':'')+'</div></div></div>'+((e.location||e.description)?'<div class="muted" style="font-size:12.5px;margin-top:8px">'+(e.location?'<i class="bi bi-geo-alt"></i> '+esc(e.location):'')+(e.description?'<div style="margin-top:4px">'+esc(e.description)+'</div>':'')+'</div>':'')+'</div>';
  }
  Routes['#/calendar']=function(){
    setTitle('ปฏิทินกิจกรรม','กิจกรรมและกำหนดการ');
    Promise.all([loadExMeta(),call('event.list',{})]).then(function(r){
      var evs=r[1].items;Store.__events=evs;
      page().innerHTML=hero({pill:'ข่าวสาร',pill_icon:'calendar-event-fill',title:'ปฏิทินกิจกรรม',sub:'กำหนดการและกิจกรรมของโรงเรียน',deco:'calendar3',kpis:[{icon:'calendar-check',value:num(evs.filter(function(e){return cfgGte(e.event_date);}).length),label:'กิจกรรมที่จะถึง'},{icon:'list-ul',value:num(evs.length),label:'ทั้งหมด'}]})
      +'<div class="toolbar"><div class="grow"></div>'+(can('event.manage')?'<button class="btn btn-primary" id="ev-add"><i class="bi bi-plus-lg"></i> เพิ่มกิจกรรม</button>':'')+'</div>'
      +'<div class="cards stagger">'+(evs.length?evs.map(eventCardBig).join(''):A.empty('calendar','ยังไม่มีกิจกรรม','เพิ่มกิจกรรมแรกในปฏิทิน'))+'</div>';
      if($('#ev-add'))$('#ev-add').addEventListener('click',function(){openEventForm(null);});
      if(can('event.manage'))$$('[data-ev]').forEach(function(el){el.addEventListener('click',function(){openEventForm(Store.__events.filter(function(x){return x.id===el.dataset.ev;})[0]);});});
    });
  };
  function cfgGte(d){return TH.iso(d)>=TH.iso(new Date());}
  function openEventForm(e){
    e=e||{};var types=Store.__exMeta.event_types;
    var tStart = '', tEnd = '';
    // แยกเวลาเริ่มและเวลาสิ้นสุดเพื่อแสดงในช่องเลือกเวลา
    if(e.time) { 
      var ts = String(e.time).split('-'); 
      tStart = (ts[0]||'').trim(); 
      tEnd = (ts[1]||'').trim(); 
    }
    A.modal({html:
      '<div class="modal-head grad"><div class="mh-ic"><i class="bi bi-calendar-event"></i></div><h3>'+(e.id?'แก้ไขกิจกรรม':'เพิ่มกิจกรรม')+'</h3><button class="modal-x" data-close><i class="bi bi-x-lg"></i></button></div>'
      +'<div class="modal-body">'+fld('ชื่อกิจกรรม *','ev-title',e.title)
      +'<div class="form-grid"><div class="field"><label>ประเภท</label><select class="input" id="ev-type">'+Object.keys(types).map(function(k){return '<option value="'+k+'" '+sel(e.event_type,k)+'>'+esc(types[k].label)+'</option>';}).join('')+'</select></div>'
      +fld('วันที่ *','ev-date',e.event_date||TH.iso(new Date()),'date')
      +'<div class="field"><label>ช่วงเวลา</label><div class="flex items-center gap-sm"><input type="time" class="input" id="ev-time-start" value="'+esc(tStart)+'"><span class="muted">-</span><input type="time" class="input" id="ev-time-end" value="'+esc(tEnd)+'"></div></div>'
      +fld('สถานที่','ev-loc',e.location)+'</div>'
      +'<div class="field"><label>กลุ่มเป้าหมาย</label><select class="input" id="ev-target"><option value="all" '+sel(e.target_role,'all')+'>ทุกคน</option><option value="teacher" '+sel(e.target_role,'teacher')+'>ครูผู้สอน</option></select></div>'
      +'<div class="field full"><label>รายละเอียด</label><textarea class="input" id="ev-desc">'+esc(e.description||'')+'</textarea></div></div>'
      +'<div class="modal-foot">'+(e.id?'<button class="btn btn-danger" id="ev-del"><i class="bi bi-trash"></i></button>':'')+'<button class="btn btn-ghost" data-close>ยกเลิก</button><button class="btn btn-primary" data-state="idle" id="ev-save"><span class="st st-idle"><i class="bi bi-check-lg"></i> บันทึก</span></button></div>',
      onMount:function(bd){
        $('#ev-save',bd).addEventListener('click',function(){
          // นำเวลาที่เลือก 2 ช่องมาเชื่อมกันเป็นรูปแบบ 08:30-16:00
          var t1 = val('ev-time-start'), t2 = val('ev-time-end');
          var tStr = (t1 && t2) ? (t1 + '-' + t2) : (t1 || t2 || '');
          
          var p={id:e.id,title:val('ev-title'),event_type:val('ev-type'),event_date:val('ev-date'),time:tStr,location:val('ev-loc'),target_role:val('ev-target'),description:val('ev-desc')};
          if(!p.title||!p.event_date){A.err('กรอกข้อมูลไม่ครบ','');return;}
          A.run(this,{loading:'กำลังบันทึก…'},function(){return call('event.save',p);}).then(function(){A.closeModal();Routes['#/calendar']();}).catch(function(){});
        });
        if($('#ev-del',bd))$('#ev-del',bd).addEventListener('click',function(){A.confirm({danger:true,title:'ลบกิจกรรม?',message:e.title}).then(function(ok){if(!ok)return;call('event.delete',{id:e.id}).then(function(){A.ok('ลบแล้ว','');A.closeModal();Routes['#/calendar']();});});});
      }
    });
  }

  /* ── small helpers (form) ─────────────────────────────────── */
  function fld(label,id,v,type){return '<div class="field"><label>'+esc(label)+'</label><input class="input" id="'+id+'" type="'+(type||'text')+'" value="'+esc(v==null?'':v)+'"></div>';}
  function sel(cur,v){return String(cur)===String(v)?'selected':'';}
  function val(id){var el=$('#'+id);return el?el.value:'';}
  function money(n){return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2});}
})();
</script>

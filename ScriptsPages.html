<script id="sps-pages-script" type="text/x-cas-pages">
(function(){
  var $=A.$, $$=A.$$, esc=A.esc, num=A.num;
  function page(){return $('#page');}

  /* ── shared building blocks ───────────────────────────────── */
  function hero(o){
    var kpis=(o.kpis||[]).map(function(k){
      return '<div class="kpi"><div class="k-ic"><i class="bi bi-'+k.icon+'"></i></div><div class="k-val">'+k.value+'</div><div class="k-lbl">'+esc(k.label)+'</div>'+(k.sub?'<div class="k-sub">'+esc(k.sub)+'</div>':'')+'</div>';
    }).join('');
    return '<section class="hero"><div class="beam"></div><div class="hero-top"><div style="flex:1"><div class="hero-pill"><i class="bi bi-'+(o.pill_icon||'stars')+'"></i> '+esc(o.pill||'')+'</div><h1>'+esc(o.title)+'</h1><p>'+esc(o.sub||'')+'</p></div><div class="hero-deco"><i class="bi bi-'+(o.deco||'mortarboard-fill')+'"></i></div></div>'+(kpis?'<div class="hero-kpis">'+kpis+'</div>':'')+'</section>';
  }
  function statMini(ic,color,bg,v,l){
    return '<div class="stat-mini"><div class="ic" style="background:'+bg+';color:'+color+'"><i class="bi bi-'+ic+'"></i></div><div><div class="v">'+v+'</div><div class="l">'+esc(l)+'</div></div></div>';
  }
  // การ์ดสรุปโมดูล (แดชบอร์ดครู) — สอดคล้องฟีเจอร์ล่าสุด


  function attBadge(st){var m=(Store.boot.att_status||{})[st];if(!m)return '<span class="badge b-muted">—</span>';
    var cls={present:'b-ok',late:'b-warn',leave:'b-info',sick:'b-purple',absent:'b-danger',activity:'b-info'}[st]||'b-muted';
    return '<span class="badge '+cls+'"><i class="bi bi-'+m.icon+'"></i> '+esc(m.label)+'</span>';}
  function conductBadge(sc){sc=Number(sc);var c=sc>=90?'b-ok':sc>=80?'b-info':sc>=60?'b-warn':'b-danger';return '<span class="badge '+c+'"><i class="bi bi-award"></i> '+sc+'</span>';}
  function classOptions(sel){return (Store.__classes||[]).map(function(c){return '<option value="'+c.id+'"'+(c.id===sel?' selected':'')+'>'+esc(c.level+'/'+c.room)+'</option>';}).join('');}
  // cache รายชื่อชั้นเรียนฝั่ง client 90 วิ — สลับหน้าไม่ยิงซ้ำ (เร็วขึ้นมาก) · invClasses() ล้างเมื่อมีการแก้
  function loadClasses(force){

    return call('class.list',{}).then(function(d){Store.__classes=d.items;Store.__classesAt=Date.now();return d.items;});

  function invClasses(){Store.__classesAt=0;}

  /* ── App launcher / quick actions / mission strip ── */

    {h:'#/activities',i:'heart-fill',t:'กิจกรรม',cap:'activity.view'},

  function quickGrid(){

    return '<div class="quick-grid">'+list.map(function(q){return '<a class="quick-btn" href="'+q.h+'"><div class="qic"><i class="bi bi-'+q.i+'"></i></div><span>'+esc(q.t)+'</span></a>';}).join('')+'</div>';

  function appLauncher(){

  function staffMissions(d){
    var m=[];

    if(risk)m.push({type:'danger',icon:'diagram-3-fill',title:'นักเรียนกลุ่มเสี่ยง/มีปัญหา '+risk+' คน',sub:'ติดตามดูแลช่วยเหลือ',h:'#/screening'});
    var con=(d.conduct&&d.conduct.atRisk)?d.conduct.atRisk.length:0;

    var pov=(d.visit&&d.visit.poverty)?((d.visit.poverty.poor||0)+(d.visit.poverty.extreme_poor||0)):0;

      +'<div class="card"><div class="card-h"><h3><i class="bi bi-pie-chart-fill"></i> สัดส่วนการมาเรียน</h3></div><div class="flex items-center gap" style="gap:18px"><div>'+A.donut(attSegs,150)+'</div><div class="legend grow">'+attSegs.map(function(s){return '<div class="lg-row"><span class="dot" style="background:'+s.color+'"></span>'+esc(s.label)+'<span class="lg-v">'+num(s.value)+'</span></div>';}).join('')+'</div></div></div>'
    +'</div>'
    +((d.care&&d.care.counts)||d.savings?'<div class="grid stagger" style="grid-template-columns:1fr 1fr;align-items:start;margin-bottom:16px">'+'</div>':'')

    +'<div class="card"><div class="card-h"><h3><i class="bi bi-grid-3x3-gap-fill"></i> ชั้นเรียน</h3><button class="btn btn-sm btn-ghost" data-go="#/students">ดูนักเรียน</button></div><div class="cards">'
      +(d.classes||[]).map(function(c){return '<div class="card hover" data-go="#/students?class='+c.id+'" style="padding:15px;border-left:4px solid '+(c.color||'#C9A227')+'"><div class="flex between items-center"><b style="font-family:var(--font);font-size:17px">'+esc(c.level+'/'+c.room)+'</b><span class="badge b-gold">'+c.student_count+' คน</span></div><div class="muted" style="font-size:12.5px;margin-top:6px"><i class="bi bi-person-badge"></i> '+esc(c.homeroom_name)+'</div></div>';}).join('')

  /* ════════════════ STUDENTS ════════════════════════════════ */

  /* ── นำเข้านักเรียนจาก Excel/CSV + แม่แบบ ── */
  var IMPORT_MAP=[
    [/เลขประจำตัว|รหัสนักเรียน|student.?code/i,'student_code'],
    [/บัตรประชาชน|id.?card/i,'id_card'],
    [/คำนำหน้า|title/i,'title'],
    [/ชื่อเล่น|nickname/i,'nickname'],
    [/ชื่อผู้ปกครอง|parent.?name/i,'parent_name'],
    [/นามสกุล|last.?name|surname/i,'last_name'],
    [/ชื่อ(?!ผู้ปกครอง)|first.?name/i,'first_name'],
    [/ชั้น|ห้อง|class|room/i,'class'],
    [/เลขที่|number|^no/i,'number'],
    [/เพศ|gender|sex/i,'gender'],
    [/วันเกิด|เกิด|birth/i,'birthdate'],
    [/กรุ๊ป|เลือด|blood/i,'blood_type'],
    [/ที่อยู่|address/i,'address'],
    [/ความเกี่ยวข้อง|ความสัมพันธ์|relation/i,'parent_relation'],
    [/เบอร์ผู้ปกครอง|parent.?phone/i,'parent_phone'],
    [/เบอร์|โทร|phone|tel/i,'phone']
  ];
  function mapHeader(h){h=String(h||'').trim();for(var i=0;i<IMPORT_MAP.length;i++){if(IMPORT_MAP[i][0].test(h))return IMPORT_MAP[i][1];}return null;}
  function parseCSV(text){
    text=String(text).replace(/^﻿/,'');var rows=[],row=[],cur='',q=false;
    for(var i=0;i<text.length;i++){var ch=text[i];
      if(q){if(ch==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}
      else{if(ch==='"')q=true;else if(ch===','){row.push(cur);cur='';}else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';}else if(ch!=='\r')cur+=ch;}
    }
    if(cur!==''||row.length){row.push(cur);rows.push(row);}
    return rows.filter(function(r){return r.some(function(c){return String(c).trim()!=='';});});
  }
  function loadXLSX(){if(window.XLSX)return Promise.resolve();return new Promise(function(res,rej){var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';s.onload=function(){res();};s.onerror=function(){rej(new Error('โหลดตัวอ่าน Excel ไม่สำเร็จ — ลองใช้ไฟล์ .csv แทน'));};document.body.appendChild(s);});}
  function downloadStudentTemplate(){
    var cls=(Store.__classes&&Store.__classes[0])?(Store.__classes[0].level+'/'+Store.__classes[0].room):'ป.4/1';

  function openStudentImport(){

      +'<div class="card mb" style="background:var(--cream-2)"><b style="font-family:var(--font)"><i class="bi bi-info-circle"></i> วิธีใช้</b><ol class="muted" style="font-size:13px;margin:8px 0 0 18px;line-height:1.8"><li>ดาวน์โหลดแม่แบบ แล้วกรอกข้อมูล (ช่องมี * จำเป็น)</li><li>ชั้นเรียนต้องตรงกับที่มีในระบบ เช่น <b>ป.4/1</b></li><li>บันทึกเป็น .csv หรือ .xlsx แล้วอัปโหลดกลับ</li><li>ระบบสร้างบัญชีนักเรียนให้อัตโนมัติ (user/รหัส = เลขประจำตัว)</li></ol></div>'
      +'<div class="flex gap wrap mb"><button class="btn btn-soft" id="im-tpl"><i class="bi bi-download"></i> ดาวน์โหลดแม่แบบ CSV</button>'
      +'<label class="btn btn-ghost" style="cursor:pointer"><i class="bi bi-upload"></i> เลือกไฟล์ (.csv/.xlsx)<input type="file" id="im-file" accept=".csv,.xlsx,.xls" class="hide"></label></div>'
      +'<div id="im-preview"></div></div>'
      +'<div class="modal-foot"><button class="btn btn-ghost" data-close>ปิด</button><button class="btn btn-primary" data-state="idle" id="im-go" disabled><span class="st st-idle"><i class="bi bi-check-lg"></i> นำเข้า</span></button></div>',
      onMount:function(bd){

          var ext=(file.name.split('.').pop()||'').toLowerCase();
          var done=function(matrix){
            var headers=(matrix[0]||[]).map(mapHeader);

            parsed=data;renderPreview();

          else{loadXLSX().then(function(){var rd=new FileReader();rd.onload=function(){try{var wb=XLSX.read(new Uint8Array(rd.result),{type:'array'});var ws=wb.Sheets[wb.SheetNames[0]];var m=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});done(m);}catch(err){$('#im-preview',bd).innerHTML=A.empty('exclamation-octagon','อ่านไฟล์ไม่สำเร็จ',err.message);}};rd.readAsArrayBuffer(file);}).catch(function(err){$('#im-preview',bd).innerHTML=A.empty('exclamation-octagon','ผิดพลาด',err.message);});}
        });
        function renderPreview(){
          var clsSet=classLabelSet();

            +'<div class="tbl-wrap" style="max-height:320px;overflow:auto"><table class="tbl"><thead><tr><th>เลขประจำตัว</th><th>ชื่อ-นามสกุล</th><th>ชั้น</th><th>สถานะ</th></tr></thead><tbody>'+(rowsHtml||'<tr><td colspan="4" class="center muted">ไม่มีข้อมูล</td></tr>')+'</tbody></table></div>';
          var btn=$('#im-go',bd);btn.disabled=valid===0;btn.querySelector('.st-idle').innerHTML='<i class="bi bi-check-lg"></i> นำเข้า '+valid+' รายการ';

          A.run(this,{loading:'กำลังนำเข้า…'},function(){return call('student.bulk_import',{rows:rows});}).then(function(res){

            A.ok('นำเข้าเสร็จสิ้น',msg);
            if(res.errors&&res.errors.length){
              $('#im-preview',bd).innerHTML='<div class="card" style="background:var(--cream-2)"><b style="font-family:var(--font)"><i class="bi bi-check-circle" style="color:var(--ok)"></i> '+msg+'</b>'+(res.errors.length?'<div class="mt" style="font-size:12.5px;max-height:200px;overflow:auto">'+res.errors.map(function(e){return '<div class="muted">• แถว '+e.line+': '+esc(e.msg)+'</div>';}).join('')+'</div>':'')+'</div>';
            } else { setTimeout(function(){A.closeModal();},900); }
            loadStudents();
          }).catch(function(){});
        });
      }
    });
  }

  function wireStudentClicks(){$$('[data-sid]').forEach(function(el){el.addEventListener('click',function(){openStudentDetail(el.dataset.sid);});});}
  function pager(d){
    if(!d.total||d.total<=d.size)return '';
    var pages=Math.ceil(d.total/d.size);var cur=d.page;var html='<div class="pagination"><button '+(cur<=1?'disabled':'')+' data-pg="'+(cur-1)+'"><i class="bi bi-chevron-left"></i></button>';
    for(var i=1;i<=pages;i++){if(i===1||i===pages||Math.abs(i-cur)<=1){html+='<button class="'+(i===cur?'active':'')+'" data-pg="'+i+'">'+i+'</button>';}else if(Math.abs(i-cur)===2){html+='<span class="muted">…</span>';}}
    html+='<button '+(cur>=pages?'disabled':'')+' data-pg="'+(cur+1)+'"><i class="bi bi-chevron-right"></i></button></div>';
    setTimeout(function(){$$('[data-pg]').forEach(function(b){b.addEventListener('click',function(){stState.page=+b.dataset.pg;loadStudents();});});},0);
    return html;
  }

      page().innerHTML=hero({pill:'ข้อมูลของฉัน',pill_icon:'heart-fill',title:'ชั่วโมงกิจกรรมของฉัน',sub:'กิจกรรมพัฒนาผู้เรียนและจิตอาสา',deco:'heart',kpis:[{icon:'clock-history',value:num(sm.total),label:'ชั่วโมงรวม'},{icon:'list-check',value:num(sm.count),label:'จำนวนกิจกรรม'}]})
      +'<div class="card mb"><div class="card-h"><h3><i class="bi bi-bar-chart-fill"></i> ชั่วโมงตามประเภท</h3></div>'+A.bars(types.map(function(t){return {label:t.label.split('/')[0],value:sm.byType[t.key]||0,suffix:' ชม.'};}))+'</div>'
      +'<div class="card"><div class="card-h"><h3><i class="bi bi-card-list"></i> ประวัติกิจกรรม</h3></div>'+(list.length?list.map(function(a){return '<div class="flex items-center gap" style="padding:9px 0;border-bottom:1px solid var(--cream-3)"><span class="badge b-gold">'+a.hours+' ชม.</span><div class="grow"><b style="font-family:var(--font);font-size:13.5px">'+esc(a.title)+'</b><div class="muted" style="font-size:12px">'+esc(a.type_label)+' · '+TH.date(a.activity_date)+'</div></div></div>';}).join(''):A.empty('heart','ยังไม่มีกิจกรรม',''))+'</div>';
    });
  };

  /* ── small helpers (form) ─────────────────────────────────── */
  function fld(label,id,v,type){return '<div class="field"><label>'+esc(label)+'</label><input class="input" id="'+id+'" type="'+(type||'text')+'" value="'+esc(v==null?'':v)+'"></div>';}
  function sel(cur,v){return String(cur)===String(v)?'selected':'';}
  function val(id){var el=$('#'+id);return el?el.value:'';}
  function money(n){return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2});}

})();
</script>

<script id="sps-pages-script" type="text/x-cas-pages">
(function(){
  var $=A.$, $$=A.$$, esc=A.esc, num=A.num;
  function page(){return $('#page');}

  /* ── shared building blocks ───────────────────────────────── */
  function hero(o){
    var kpis=(o.kpis||[]).map(function(k){
      return '<div class="kpi"><div class="k-ic"><i class="bi bi-'+k.icon+'"></i></div><div class="k-val">'+k.value+'</div><div class="k-lbl">'+esc(k.label)+'</div>'+(k.sub?'<div class="k-sub">'+esc(k.sub)+'</div>':'')+'</div>';
    }).join('');
    return '<section class="hero"><div class="beam"></div><div class="hero-top"><div style="flex:1"><div class="hero-pill"><i class="bi bi-'+(o.pill_icon||'stars')+'"></i> '+esc(o.pill||'')+'</div><h1>'+esc(o.title)+'</h1><p>'+esc(o.sub||'')+'</p></div><div class="hero-deco"><i class="bi bi-'+(o.deco||'mortarboard-fill')+'"></i></div></div>'+(kpis?'<div class="hero-kpis">'+kpis+'</div>':'')+'</section>';
  }
  function statMini(ic,color,bg,v,l){
    return '<div class="stat-mini"><div class="ic" style="background:'+bg+';color:'+color+'"><i class="bi bi-'+ic+'"></i></div><div><div class="v">'+v+'</div><div class="l">'+esc(l)+'</div></div></div>';
  }
  // การ์ดสรุปโมดูล (แดชบอร์ดครู) — สอดคล้องฟีเจอร์ล่าสุด


  function attBadge(st){var m=(Store.boot.att_status||{})[st];if(!m)return '<span class="badge b-muted">—</span>';
    var cls={present:'b-ok',late:'b-warn',leave:'b-info',sick:'b-purple',absent:'b-danger',activity:'b-info'}[st]||'b-muted';
    return '<span class="badge '+cls+'"><i class="bi bi-'+m.icon+'"></i> '+esc(m.label)+'</span>';}
  function conductBadge(sc){sc=Number(sc);var c=sc>=90?'b-ok':sc>=80?'b-info':sc>=60?'b-warn':'b-danger';return '<span class="badge '+c+'"><i class="bi bi-award"></i> '+sc+'</span>';}
  function classOptions(sel){return (Store.__classes||[]).map(function(c){return '<option value="'+c.id+'"'+(c.id===sel?' selected':'')+'>'+esc(c.level+'/'+c.room)+'</option>';}).join('');}
  // cache รายชื่อชั้นเรียนฝั่ง client 90 วิ — สลับหน้าไม่ยิงซ้ำ (เร็วขึ้นมาก) · invClasses() ล้างเมื่อมีการแก้
  function loadClasses(force){

    return call('class.list',{}).then(function(d){Store.__classes=d.items;Store.__classesAt=Date.now();return d.items;});

  function invClasses(){Store.__classesAt=0;}

  /* ── App launcher / quick actions / mission strip ── */

    {h:'#/activities',i:'heart-fill',t:'กิจกรรม',cap:'activity.view'},

  function quickGrid(){

    return '<div class="quick-grid">'+list.map(function(q){return '<a class="quick-btn" href="'+q.h+'"><div class="qic"><i class="bi bi-'+q.i+'"></i></div><span>'+esc(q.t)+'</span></a>';}).join('')+'</div>';

  function appLauncher(){

  function staffMissions(d){
    var m=[];

    if(risk)m.push({type:'danger',icon:'diagram-3-fill',title:'นักเรียนกลุ่มเสี่ยง/มีปัญหา '+risk+' คน',sub:'ติดตามดูแลช่วยเหลือ',h:'#/screening'});
    var con=(d.conduct&&d.conduct.atRisk)?d.conduct.atRisk.length:0;

    var pov=(d.visit&&d.visit.poverty)?((d.visit.poverty.poor||0)+(d.visit.poverty.extreme_poor||0)):0;

      +'<div class="card"><div class="card-h"><h3><i class="bi bi-pie-chart-fill"></i> สัดส่วนการมาเรียน</h3></div><div class="flex items-center gap" style="gap:18px"><div>'+A.donut(attSegs,150)+'</div><div class="legend grow">'+attSegs.map(function(s){return '<div class="lg-row"><span class="dot" style="background:'+s.color+'"></span>'+esc(s.label)+'<span class="lg-v">'+num(s.value)+'</span></div>';}).join('')+'</div></div></div>'
    +'</div>'
    +((d.care&&d.care.counts)||d.savings?'<div class="grid stagger" style="grid-template-columns:1fr 1fr;align-items:start;margin-bottom:16px">'+'</div>':'')

    +'<div class="card"><div class="card-h"><h3><i class="bi bi-grid-3x3-gap-fill"></i> ชั้นเรียน</h3><button class="btn btn-sm btn-ghost" data-go="#/students">ดูนักเรียน</button></div><div class="cards">'
      +(d.classes||[]).map(function(c){return '<div class="card hover" data-go="#/students?class='+c.id+'" style="padding:15px;border-left:4px solid '+(c.color||'#C9A227')+'"><div class="flex between items-center"><b style="font-family:var(--font);font-size:17px">'+esc(c.level+'/'+c.room)+'</b><span class="badge b-gold">'+c.student_count+' คน</span></div><div class="muted" style="font-size:12.5px;margin-top:6px"><i class="bi bi-person-badge"></i> '+esc(c.homeroom_name)+'</div></div>';}).join('')

  /* ════════════════ STUDENTS ════════════════════════════════ */

  /* ── นำเข้านักเรียนจาก Excel/CSV + แม่แบบ ── */
  var IMPORT_MAP=[
    [/เลขประจำตัว|รหัสนักเรียน|student.?code/i,'student_code'],
    [/บัตรประชาชน|id.?card/i,'id_card'],
    [/คำนำหน้า|title/i,'title'],
    [/ชื่อเล่น|nickname/i,'nickname'],
    [/ชื่อผู้ปกครอง|parent.?name/i,'parent_name'],
    [/นามสกุล|last.?name|surname/i,'last_name'],
    [/ชื่อ(?!ผู้ปกครอง)|first.?name/i,'first_name'],
    [/ชั้น|ห้อง|class|room/i,'class'],
    [/เลขที่|number|^no/i,'number'],
    [/เพศ|gender|sex/i,'gender'],
    [/วันเกิด|เกิด|birth/i,'birthdate'],
    [/กรุ๊ป|เลือด|blood/i,'blood_type'],
    [/ที่อยู่|address/i,'address'],
    [/ความเกี่ยวข้อง|ความสัมพันธ์|relation/i,'parent_relation'],
    [/เบอร์ผู้ปกครอง|parent.?phone/i,'parent_phone'],
    [/เบอร์|โทร|phone|tel/i,'phone']
  ];
  function mapHeader(h){h=String(h||'').trim();for(var i=0;i<IMPORT_MAP.length;i++){if(IMPORT_MAP[i][0].test(h))return IMPORT_MAP[i][1];}return null;}
  function parseCSV(text){
    text=String(text).replace(/^﻿/,'');var rows=[],row=[],cur='',q=false;
    for(var i=0;i<text.length;i++){var ch=text[i];
      if(q){if(ch==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}
      else{if(ch==='"')q=true;else if(ch===','){row.push(cur);cur='';}else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';}else if(ch!=='\r')cur+=ch;}
    }
    if(cur!==''||row.length){row.push(cur);rows.push(row);}
    return rows.filter(function(r){return r.some(function(c){return String(c).trim()!=='';});});
  }
  function loadXLSX(){if(window.XLSX)return Promise.resolve();return new Promise(function(res,rej){var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';s.onload=function(){res();};s.onerror=function(){rej(new Error('โหลดตัวอ่าน Excel ไม่สำเร็จ — ลองใช้ไฟล์ .csv แทน'));};document.body.appendChild(s);});}
  function downloadStudentTemplate(){
    var cls=(Store.__classes&&Store.__classes[0])?(Store.__classes[0].level+'/'+Store.__classes[0].room):'ป.4/1';

  function openStudentImport(){

      +'<div class="card mb" style="background:var(--cream-2)"><b style="font-family:var(--font)"><i class="bi bi-info-circle"></i> วิธีใช้</b><ol class="muted" style="font-size:13px;margin:8px 0 0 18px;line-height:1.8"><li>ดาวน์โหลดแม่แบบ แล้วกรอกข้อมูล (ช่องมี * จำเป็น)</li><li>ชั้นเรียนต้องตรงกับที่มีในระบบ เช่น <b>ป.4/1</b></li><li>บันทึกเป็น .csv หรือ .xlsx แล้วอัปโหลดกลับ</li><li>ระบบสร้างบัญชีนักเรียนให้อัตโนมัติ (user/รหัส = เลขประจำตัว)</li></ol></div>'
      +'<div class="flex gap wrap mb"><button class="btn btn-soft" id="im-tpl"><i class="bi bi-download"></i> ดาวน์โหลดแม่แบบ CSV</button>'
      +'<label class="btn btn-ghost" style="cursor:pointer"><i class="bi bi-upload"></i> เลือกไฟล์ (.csv/.xlsx)<input type="file" id="im-file" accept=".csv,.xlsx,.xls" class="hide"></label></div>'
      +'<div id="im-preview"></div></div>'
      +'<div class="modal-foot"><button class="btn btn-ghost" data-close>ปิด</button><button class="btn btn-primary" data-state="idle" id="im-go" disabled><span class="st st-idle"><i class="bi bi-check-lg"></i> นำเข้า</span></button></div>',
      onMount:function(bd){

          var ext=(file.name.split('.').pop()||'').toLowerCase();
          var done=function(matrix){
            var headers=(matrix[0]||[]).map(mapHeader);

            parsed=data;renderPreview();

          else{loadXLSX().then(function(){var rd=new FileReader();rd.onload=function(){try{var wb=XLSX.read(new Uint8Array(rd.result),{type:'array'});var ws=wb.Sheets[wb.SheetNames[0]];var m=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});done(m);}catch(err){$('#im-preview',bd).innerHTML=A.empty('exclamation-octagon','อ่านไฟล์ไม่สำเร็จ',err.message);}};rd.readAsArrayBuffer(file);}).catch(function(err){$('#im-preview',bd).innerHTML=A.empty('exclamation-octagon','ผิดพลาด',err.message);});}
        });
        function renderPreview(){
          var clsSet=classLabelSet();

            +'<div class="tbl-wrap" style="max-height:320px;overflow:auto"><table class="tbl"><thead><tr><th>เลขประจำตัว</th><th>ชื่อ-นามสกุล</th><th>ชั้น</th><th>สถานะ</th></tr></thead><tbody>'+(rowsHtml||'<tr><td colspan="4" class="center muted">ไม่มีข้อมูล</td></tr>')+'</tbody></table></div>';
          var btn=$('#im-go',bd);btn.disabled=valid===0;btn.querySelector('.st-idle').innerHTML='<i class="bi bi-check-lg"></i> นำเข้า '+valid+' รายการ';

          A.run(this,{loading:'กำลังนำเข้า…'},function(){return call('student.bulk_import',{rows:rows});}).then(function(res){

            A.ok('นำเข้าเสร็จสิ้น',msg);
            if(res.errors&&res.errors.length){
              $('#im-preview',bd).innerHTML='<div class="card" style="background:var(--cream-2)"><b style="font-family:var(--font)"><i class="bi bi-check-circle" style="color:var(--ok)"></i> '+msg+'</b>'+(res.errors.length?'<div class="mt" style="font-size:12.5px;max-height:200px;overflow:auto">'+res.errors.map(function(e){return '<div class="muted">• แถว '+e.line+': '+esc(e.msg)+'</div>';}).join('')+'</div>':'')+'</div>';
            } else { setTimeout(function(){A.closeModal();},900); }
            loadStudents();
          }).catch(function(){});
        });
      }
    });
  }

  function wireStudentClicks(){$$('[data-sid]').forEach(function(el){el.addEventListener('click',function(){openStudentDetail(el.dataset.sid);});});}
  function pager(d){
    if(!d.total||d.total<=d.size)return '';
    var pages=Math.ceil(d.total/d.size);var cur=d.page;var html='<div class="pagination"><button '+(cur<=1?'disabled':'')+' data-pg="'+(cur-1)+'"><i class="bi bi-chevron-left"></i></button>';
    for(var i=1;i<=pages;i++){if(i===1||i===pages||Math.abs(i-cur)<=1){html+='<button class="'+(i===cur?'active':'')+'" data-pg="'+i+'">'+i+'</button>';}else if(Math.abs(i-cur)===2){html+='<span class="muted">…</span>';}}
    html+='<button '+(cur>=pages?'disabled':'')+' data-pg="'+(cur+1)+'"><i class="bi bi-chevron-right"></i></button></div>';
    setTimeout(function(){$$('[data-pg]').forEach(function(b){b.addEventListener('click',function(){stState.page=+b.dataset.pg;loadStudents();});});},0);
    return html;
  }

  function setRosterStatus(sid,st,silent){

  function updateAttCounts(){

  function saveAttendance(){
    var btn=$('#at-save');
    var noteMap={};(Store.__roster||[]).forEach(function(s){noteMap[s.student_id]=s.note||'';}); // คงหมายเหตุเดิม (เช่น ลาออนไลน์)

  }

  function renderHealth(items,self){
    var bmiLabel=Store.boot.bmi_label||{};

    +(self||!can('health.record')?'':'<div class="toolbar"><div class="grow"></div><button class="btn btn-primary" id="he-add"><i class="bi bi-plus-lg"></i> บันทึกสุขภาพ</button></div>')
    +'<div class="tbl-wrap"><table class="tbl"><thead><tr>'+(self?'':'<th>นักเรียน</th>')+'<th>วันที่</th><th>น้ำหนัก</th><th>ส่วนสูง</th><th>BMI</th><th>เกณฑ์</th><th>สายตา</th></tr></thead><tbody>'
    +(items.length?items.map(function(h){
      var bc={underweight:'b-info',normal:'b-ok',overweight:'b-warn',obese:'b-danger'}[h.bmi_level]||'b-muted';
      return '<tr>'+(self?'':'<td data-label="นักเรียน">'+esc(h.student_name)+'</td>')+'<td data-label="วันที่">'+TH.date(h.record_date)+'</td><td data-label="น้ำหนัก">'+esc(h.weight)+' กก.</td><td data-label="ส่วนสูง">'+esc(h.height)+' ซม.</td><td data-label="BMI">'+esc(h.bmi)+'</td><td data-label="เกณฑ์"><span class="badge '+bc+'">'+esc(bmiLabel[h.bmi_level]||'-')+'</span></td><td data-label="สายตา">'+esc(h.vision_l||'-')+' / '+esc(h.vision_r||'-')+'</td></tr>';
    }).join(''):'<tr><td colspan="7">'+A.empty('heart-pulse','ยังไม่มีบันทึกสุขภาพ','')+'</td></tr>')

      '<div class="modal-head grad"><div class="mh-ic"><i class="bi bi-heart-pulse"></i></div><h3>บันทึกสุขภาพ</h3><button class="modal-x" data-close><i class="bi bi-x-lg"></i></button></div>'
      +'<div class="modal-body"><div class="field"><label>นักเรียน *</label><select class="input" id="hf-student"><option value="">— เลือก —</option></select></div>'

  function bandBadge(b){var m={normal:['b-ok','ปกติ'],risk:['b-warn','เสี่ยง'],problem:['b-danger','มีปัญหา'],strength_low:['b-warn','ควรส่งเสริม']}[b];return m?'<span class="badge '+m[0]+'">'+m[1]+'</span>':'<span class="badge b-muted">—</span>';}

  function renderSdqList(list){
    $('#sq-list').innerHTML='<div class="tbl-wrap"><table class="tbl"><thead><tr><th>นักเรียน</th><th>ชั้น</th><th>คะแนนรวม</th><th>ผลประเมิน</th><th>ล่าสุด</th><th></th></tr></thead><tbody>'
      +(list.length?list.map(function(s){return '<tr class="row-click" data-sid="'+s.id+'"><td data-label="นักเรียน"><div class="flex items-center gap-sm">'+A.avatar(s.photo_url,s.full_name,30)+' '+esc(s.full_name)+'</div></td><td data-label="ชั้น">'+esc(s.class_label)+'</td><td data-label="คะแนนรวม">'+(s.sdq_total!=null?s.sdq_total+'/40':'<span class="muted">—</span>')+'</td><td data-label="ผล">'+(s.sdq_band?bandBadge(s.sdq_band):'<span class="muted">ยังไม่ประเมิน</span>')+'</td><td data-label="ล่าสุด">'+(s.sdq_date?TH.date(s.sdq_date):'-')+'</td><td><i class="bi bi-chevron-right muted"></i></td></tr>';}).join(''):'<tr><td colspan="6">'+A.empty('clipboard2-x','ไม่พบนักเรียน','')+'</td></tr>')

  function clientSdqScore(ans){var meta=Store.__sdqMeta;var sum={e:0,c:0,h:0,p:0,pro:0};meta.items.forEach(function(it,i){var raw=ans[i]||0;var v=it.rev?(2-raw):raw;sum[it.s]+=v;});return {sum:sum,total:sum.e+sum.c+sum.h+sum.p};}

  /* ════════════════ CARE: SCREENING (4 กลุ่ม) ═══════════════ */
  function groupChip(g){var m={normal:['b-ok','ปกติ'],risk:['b-warn','เสี่ยง'],problem:['b-danger','มีปัญหา'],special:['b-purple','พิเศษ']}[g];return m?'<span class="badge '+m[0]+'">'+m[1]+'</span>':'<span class="badge b-muted">ยังไม่คัดกรอง</span>';}

  function reviewLeave(id,status,btn){
    A.confirm({title:status==='approved'?'อนุมัติการลา?':'ไม่อนุมัติการลา?',message:status==='approved'?'ระบบจะลงเช็กชื่อ (ลา) ให้อัตโนมัติตามช่วงวันที่':'คำขอนี้จะถูกปฏิเสธ',danger:status==='rejected',confirm:status==='approved'?'อนุมัติ':'ไม่อนุมัติ'}).then(function(ok){
      if(!ok)return;
      A.run(btn,{loading:status==='approved'?'กำลังอนุมัติ…':'กำลังบันทึก…'},function(){return call('leave.review',{id:id,status:status});})
        .then(function(d){A.ok(status==='approved'?'อนุมัติแล้ว':'ไม่อนุมัติแล้ว',d.marked?'ลงเช็กชื่อให้ '+d.marked+' วัน':'');Routes['#/leave']();})
        .catch(function(){});
    });
  }

      +'<div class="field"><label>ประเภทการลา</label><div class="chips" id="lf-type"><button type="button" class="chip active" data-t="sick"><i class="bi bi-bandaid"></i> ลาป่วย</button><button type="button" class="chip" data-t="personal"><i class="bi bi-envelope-paper"></i> ลากิจ</button></div></div>'
      +'<div class="form-grid">'+fld('ตั้งแต่วันที่ *','lf-from',TH.iso(new Date()),'date')+fld('ถึงวันที่','lf-to',TH.iso(new Date()),'date')+'</div>'
      +'<div class="field full"><label>เหตุผลการลา *</label><textarea class="input" id="lf-reason"></textarea></div>'
      +'<div class="field full"><label>แนบหลักฐาน (ใบรับรองแพทย์/รูป)</label><input type="file" class="input" id="lf-att" accept="image/*"></div></div>'
      +'<div class="modal-foot"><button class="btn btn-ghost" data-close>ยกเลิก</button><button class="btn btn-primary" data-state="idle" id="lf-save"><span class="st st-idle"><i class="bi bi-send"></i> ส่งคำขอ</span></button></div>',
      onMount:function(bd){
        var type='sick',att='';
        if(staff)call('student.list',{size:500}).then(function(d){$('#lf-student',bd).innerHTML='<option value="">— เลือก —</option>'+d.items.map(function(s){return '<option value="'+s.id+'">'+esc(s.full_name+' ('+s.class_label+')')+'</option>';}).join('');});
        $$('#lf-type .chip',bd).forEach(function(c){c.addEventListener('click',function(){type=c.dataset.t;$$('#lf-type .chip',bd).forEach(function(x){x.classList.remove('active');});c.classList.add('active');});});
        $('#lf-att',bd).addEventListener('change',function(e){A.fileToDataUrl(e.target.files[0],1000).then(function(dd){att=dd;});});
        $('#lf-save',bd).addEventListener('click',function(){
          var btn=this;var p={leave_type:type,date_from:val('lf-from'),date_to:val('lf-to'),reason:val('lf-reason')};

          if(!p.reason){A.err('ระบุเหตุผล','');return;}
          if(att)p.attachment=att;
          A.submit(btn,'loading');call('leave.request',p).then(function(){A.submit(btn,'success');A.ok('ส่งคำขอลาสำเร็จ','');setTimeout(function(){A.closeModal();if(location.hash.indexOf('me-leave')>=0)Routes['#/me-leave']();else if(location.hash.indexOf('leave')>=0)Routes['#/leave']();},700);}).catch(function(e){A.submit(btn,'error');A.err('ผิดพลาด',e.message);});

  /* ════════════════ วัดผล & เอกสาร ปพ. ══════════════════════ */
  function loadGradeMeta(){return Store.__gradeMeta?Promise.resolve(Store.__gradeMeta):call('grade.meta',{}).then(function(m){Store.__gradeMeta=m;return m;});}
  function acYear(){return Store.boot.settings?Store.boot.settings.academic_year:(new Date().getFullYear()+543);}
  function gradeBadge(g){var v=(Store.__gradeMeta.grade_values||{})[String(g)];var cls=(v==null)?'b-muted':(v>=3.5?'b-ok':v>=2.5?'b-info':v>=1?'b-warn':'b-danger');return '<span class="badge '+cls+'">'+esc(g||'-')+'</span>';}
  function termOptions(sel){return [['1','ภาคเรียนที่ 1'],['2','ภาคเรียนที่ 2']].map(function(t){return '<option value="'+t[0]+'"'+(String(sel)===t[0]?' selected':'')+'>'+t[1]+'</option>';}).join('');}

    call('grade.sheet',{class_id:grState.class_id,subject_id:grState.subject_id,term:grState.term,year:$('#gr-year').value}).then(function(d){
      var opts=Store.__gradeMeta.grade_order;

      if($('#ac-add'))$('#ac-add').addEventListener('click',function(){openActForm();});
      loadActList();
    });
  };
  function loadActList(){
    $('#ac-list').innerHTML=A.skeletonCards(2);
    call('act.list',{limit:60}).then(function(d){
      $('#ac-list').innerHTML=d.items.length?('<div class="tbl-wrap"><table class="tbl"><thead><tr><th>วันที่</th><th>นักเรียน</th><th>ประเภท</th><th>กิจกรรม</th><th>ชม.</th>'+(can('activity.manage')?'<th></th>':'')+'</tr></thead><tbody>'+d.items.map(function(a){return '<tr><td data-label="วันที่">'+TH.date(a.activity_date)+'</td><td data-label="นักเรียน">'+esc(a.student_name)+'</td><td data-label="ประเภท"><span class="badge b-muted">'+esc(a.type_label)+'</span></td><td data-label="กิจกรรม">'+esc(a.title)+'</td><td data-label="ชม.">'+a.hours+'</td>'+(can('activity.manage')?'<td><button class="btn btn-sm btn-ghost" data-del="'+a.id+'"><i class="bi bi-trash"></i></button></td>':'')+'</tr>';}).join('')+'</tbody></table></div>'):A.empty('heart','ยังไม่มีบันทึกกิจกรรม','');
      $$('#ac-list [data-del]').forEach(function(b){b.addEventListener('click',function(){A.confirm({danger:true,title:'ลบรายการ?',message:''}).then(function(ok){if(!ok)return;call('act.delete',{id:b.dataset.del}).then(function(){A.ok('ลบแล้ว','');loadActList();});});});});
    });
  }
  function openActForm(){
    var types=Store.__exMeta.activity_types;
    A.modal({html:
      '<div class="modal-head grad"><div class="mh-ic"><i class="bi bi-heart"></i></div><h3>บันทึกกิจกรรมพัฒนาผู้เรียน</h3><button class="modal-x" data-close><i class="bi bi-x-lg"></i></button></div>'
      +'<div class="modal-body"><div class="field"><label>นักเรียน *</label><select class="input" id="af-student"><option value="">— เลือก —</option></select></div>'
      +'<div class="field"><label>ประเภทกิจกรรม</label><select class="input" id="af-type">'+types.map(function(t){return '<option value="'+t.key+'">'+esc(t.label)+'</option>';}).join('')+'</select></div>'
      +fld('ชื่อกิจกรรม *','af-title','')
      +'<div class="form-grid">'+fld('จำนวนชั่วโมง *','af-hours','','number')+fld('วันที่','af-date',TH.iso(new Date()),'date')+'</div>'
      +fld('สถานที่','af-loc','')+'</div>'
      +'<div class="modal-foot"><button class="btn btn-ghost" data-close>ยกเลิก</button><button class="btn btn-primary" data-state="idle" id="af-save"><span class="st st-idle"><i class="bi bi-check-lg"></i> บันทึก</span></button></div>',
      onMount:function(bd){
        call('student.list',{size:500}).then(function(d){$('#af-student',bd).innerHTML='<option value="">— เลือก —</option>'+d.items.map(function(s){return '<option value="'+s.id+'">'+esc(s.full_name+' ('+s.class_label+')')+'</option>';}).join('');});
        $('#af-save',bd).addEventListener('click',function(){
          var p={student_id:val('af-student'),activity_type:val('af-type'),title:val('af-title'),hours:val('af-hours'),activity_date:val('af-date'),location:val('af-loc')};
          if(!p.student_id||!p.title||!(Number(p.hours)>0)){A.err('กรอกข้อมูลไม่ครบ','ต้องมีนักเรียน ชื่อกิจกรรม และชั่วโมง');return;}
          A.run(this,{loading:'กำลังบันทึก…'},function(){return call('act.save',p);}).then(function(){A.ok('บันทึกสำเร็จ','');A.closeModal();Routes['#/activities']();}).catch(function(){});
        });
      }
    });
  }

  /* ── ปฏิทินกิจกรรม ── */
  function eventCardBig(e){
    var edit=can('event.manage');
    return '<div class="card'+(edit?' hover':'')+'"'+(edit?' data-ev="'+e.id+'"':'')+' style="border-left:4px solid '+(e.type_color||'#8A6608')+'"><div class="flex items-center gap">'+eventDateBlock(e.event_date,e.type_color)+'<div class="grow" style="min-width:0"><b style="font-family:var(--font);font-size:15px">'+esc(e.title)+'</b><div class="muted" style="font-size:12px;margin-top:2px"><span class="badge" style="background:'+(e.type_color||'#8A6608')+'22;color:'+(e.type_color||'#8A6608')+'">'+esc(e.type_label)+'</span>'+(e.time?' · '+esc(e.time)+' น.':'')+'</div></div></div>'+((e.location||e.description)?'<div class="muted" style="font-size:12.5px;margin-top:8px">'+(e.location?'<i class="bi bi-geo-alt"></i> '+esc(e.location):'')+(e.description?'<div style="margin-top:4px">'+esc(e.description)+'</div>':'')+'</div>':'')+'</div>';
  }
  Routes['#/calendar']=function(){
    setTitle('ปฏิทินกิจกรรม','กิจกรรมและกำหนดการ');
    Promise.all([loadExMeta(),call('event.list',{})]).then(function(r){
      var evs=r[1].items;Store.__events=evs;
      page().innerHTML=hero({pill:'ข่าวสาร',pill_icon:'calendar-event-fill',title:'ปฏิทินกิจกรรม',sub:'กำหนดการและกิจกรรมของโรงเรียน',deco:'calendar3',kpis:[{icon:'calendar-check',value:num(evs.filter(function(e){return cfgGte(e.event_date);}).length),label:'กิจกรรมที่จะถึง'},{icon:'list-ul',value:num(evs.length),label:'ทั้งหมด'}]})
      +'<div class="toolbar"><div class="grow"></div>'+(can('event.manage')?'<button class="btn btn-primary" id="ev-add"><i class="bi bi-plus-lg"></i> เพิ่มกิจกรรม</button>':'')+'</div>'
      +'<div class="cards stagger">'+(evs.length?evs.map(eventCardBig).join(''):A.empty('calendar','ยังไม่มีกิจกรรม','เพิ่มกิจกรรมแรกในปฏิทิน'))+'</div>';
      if($('#ev-add'))$('#ev-add').addEventListener('click',function(){openEventForm(null);});
      if(can('event.manage'))$$('[data-ev]').forEach(function(el){el.addEventListener('click',function(){openEventForm(Store.__events.filter(function(x){return x.id===el.dataset.ev;})[0]);});});
    });
  };
  function cfgGte(d){return TH.iso(d)>=TH.iso(new Date());}
  function openEventForm(e){
    e=e||{};var types=Store.__exMeta.event_types;
    A.modal({html:
      '<div class="modal-head grad"><div class="mh-ic"><i class="bi bi-calendar-event"></i></div><h3>'+(e.id?'แก้ไขกิจกรรม':'เพิ่มกิจกรรม')+'</h3><button class="modal-x" data-close><i class="bi bi-x-lg"></i></button></div>'
      +'<div class="modal-body">'+fld('ชื่อกิจกรรม *','ev-title',e.title)
      +'<div class="form-grid"><div class="field"><label>ประเภท</label><select class="input" id="ev-type">'+Object.keys(types).map(function(k){return '<option value="'+k+'" '+sel(e.event_type,k)+'>'+esc(types[k].label)+'</option>';}).join('')+'</select></div>'
      +fld('วันที่ *','ev-date',e.event_date||TH.iso(new Date()),'date')+fld('เวลา','ev-time',e.time)+fld('สถานที่','ev-loc',e.location)+'</div>'
      +'<div class="field"><label>กลุ่มเป้าหมาย</label><select class="input" id="ev-target"><option value="all" '+sel(e.target_role,'all')+'>ทุกคน</option><option value="student" '+sel(e.target_role,'student')+'>นักเรียน</option><option value="homeroom" '+sel(e.target_role,'homeroom')+'>ครูประจำชั้น</option><option value="teacher" '+sel(e.target_role,'teacher')+'>ครูผู้สอน</option></select></div>'
      +'<div class="field full"><label>รายละเอียด</label><textarea class="input" id="ev-desc">'+esc(e.description||'')+'</textarea></div></div>'
      +'<div class="modal-foot">'+(e.id?'<button class="btn btn-danger" id="ev-del"><i class="bi bi-trash"></i></button>':'')+'<button class="btn btn-ghost" data-close>ยกเลิก</button><button class="btn btn-primary" data-state="idle" id="ev-save"><span class="st st-idle"><i class="bi bi-check-lg"></i> บันทึก</span></button></div>',
      onMount:function(bd){
        $('#ev-save',bd).addEventListener('click',function(){
          var p={id:e.id,title:val('ev-title'),event_type:val('ev-type'),event_date:val('ev-date'),time:val('ev-time'),location:val('ev-loc'),target_role:val('ev-target'),description:val('ev-desc')};
          if(!p.title||!p.event_date){A.err('กรอกข้อมูลไม่ครบ','');return;}
          A.run(this,{loading:'กำลังบันทึก…'},function(){return call('event.save',p);}).then(function(){A.closeModal();Routes['#/calendar']();}).catch(function(){});
        });
        if($('#ev-del',bd))$('#ev-del',bd).addEventListener('click',function(){A.confirm({danger:true,title:'ลบกิจกรรม?',message:e.title}).then(function(ok){if(!ok)return;call('event.delete',{id:e.id}).then(function(){A.ok('ลบแล้ว','');A.closeModal();Routes['#/calendar']();});});});
      }
    });
  }

  /* ── เงินที่ต้องชำระของฉัน (นักเรียน) ── */
  Routes['#/me-fund']=function(){
    setTitle('เงินกิจกรรม','รายการที่ต้องชำระ');
    call('fund.dues',{}).then(function(d){
      page().innerHTML=hero({pill:'ข้อมูลของฉัน',pill_icon:'wallet-fill',title:'เงินกิจกรรมของฉัน',sub:'รายการเรียกเก็บและสถานะการชำระ',deco:'wallet2',kpis:[
        {icon:'check-circle-fill',value:money(d.totalPaid),label:'ชำระแล้ว (บาท)'},{icon:'exclamation-circle-fill',value:money(d.outstanding),label:'ค้างชำระ (บาท)'},{icon:'list-ul',value:num(d.items.length),label:'รายการ'}
      ]})
      +'<div class="card"><div class="card-h"><h3><i class="bi bi-receipt"></i> รายการเรียกเก็บ</h3>'+(d.items.length?'<button class="btn btn-sm btn-soft" id="mf-print"><i class="bi bi-printer"></i> พิมพ์ใบสรุป</button>':'')+'</div>'
      +(d.items.length?'<div class="tbl-wrap"><table class="tbl"><thead><tr><th>รายการ</th><th>ประเภท</th><th style="text-align:right">จำนวน</th><th>สถานะ</th></tr></thead><tbody>'+d.items.map(function(it){return '<tr><td data-label="รายการ">'+esc(it.title)+'</td><td data-label="ประเภท">'+esc(it.cat_label)+'</td><td data-label="จำนวน" style="text-align:right">'+money(it.amount)+'</td><td data-label="สถานะ">'+(it.paid?'<span class="badge b-ok"><i class="bi bi-check-circle"></i> ชำระแล้ว</span>':'<span class="badge b-danger"><i class="bi bi-exclamation-circle"></i> ค้างชำระ</span>')+'</td></tr>';}).join('')+'</tbody></table></div>':A.empty('wallet','ไม่มีรายการเรียกเก็บ',''))+'</div>';
      if($('#mf-print'))$('#mf-print').addEventListener('click',function(){printFundReceipt(d);});
    });
  };
  function printFundReceipt(d){
    var s=d.student||{};
    var rows=d.items.map(function(it){return '<tr><td>'+esc(it.title)+'</td><td>'+esc(it.cat_label)+'</td><td class="pr-r">'+money(it.amount)+'</td><td class="pr-c">'+(it.paid?'<span class="pr-badge pr-b-dep">ชำระแล้ว</span>':'<span class="pr-badge pr-b-wd">ค้างชำระ</span>')+'</td><td class="pr-c">'+(it.paid?TH.date(it.paid_date):'-')+'</td></tr>';}).join('');
    var body='<div class="pr-stats"><div class="pr-stat"><div class="v">'+money(d.totalPaid)+'</div><div class="l">ชำระแล้ว (บาท)</div></div><div class="pr-stat"><div class="v">'+money(d.outstanding)+'</div><div class="l">ค้างชำระ (บาท)</div></div><div class="pr-stat"><div class="v">'+money(d.totalDue)+'</div><div class="l">รวมทั้งหมด</div></div></div>'
      +'<div class="pr-section">ข้อมูลนักเรียน</div><table class="pr-table"><tbody><tr><th style="width:130px">ชื่อ-นามสกุล</th><td>'+esc(s.full_name)+'</td><th style="width:108px">ชั้น/เลขที่</th><td>'+esc(s.class_label)+' / '+esc(s.number)+'</td></tr></tbody></table>'
      +'<div class="pr-section">รายการเรียกเก็บ</div><table class="pr-table"><thead><tr><th>รายการ</th><th>ประเภท</th><th class="pr-r">จำนวน</th><th class="pr-c">สถานะ</th><th class="pr-c">วันที่ชำระ</th></tr></thead><tbody>'+rows+'</tbody></table>';
    A.printDoc({pill:'ใบสรุปการชำระเงิน',title:'ใบสรุปการชำระเงินกิจกรรม/กองทุนห้อง',subtitle:s.full_name+' · ชั้น '+s.class_label,docNo:'FUND-'+(s.student_code||''),watermark:'การเงิน',content:body,signatures:[{role:'ผู้รับเงิน'},{role:'ครูประจำชั้น'}]});
  }

  /* ── ชั่วโมงกิจกรรมของฉัน (นักเรียน) ── */
  Routes['#/me-activities']=function(){
    setTitle('ชั่วโมงกิจกรรม','กิจกรรมพัฒนาผู้เรียนของฉัน');
    Promise.all([loadExMeta(),call('act.summary',{}),call('act.list',{})]).then(function(r){
      var sm=r[1];var list=r[2].items;var types=Store.__exMeta.activity_types;
      page().innerHTML=hero({pill:'ข้อมูลของฉัน',pill_icon:'heart-fill',title:'ชั่วโมงกิจกรรมของฉัน',sub:'กิจกรรมพัฒนาผู้เรียนและจิตอาสา',deco:'heart',kpis:[{icon:'clock-history',value:num(sm.total),label:'ชั่วโมงรวม'},{icon:'list-check',value:num(sm.count),label:'จำนวนกิจกรรม'}]})
      +'<div class="card mb"><div class="card-h"><h3><i class="bi bi-bar-chart-fill"></i> ชั่วโมงตามประเภท</h3></div>'+A.bars(types.map(function(t){return {label:t.label.split('/')[0],value:sm.byType[t.key]||0,suffix:' ชม.'};}))+'</div>'
      +'<div class="card"><div class="card-h"><h3><i class="bi bi-card-list"></i> ประวัติกิจกรรม</h3></div>'+(list.length?list.map(function(a){return '<div class="flex items-center gap" style="padding:9px 0;border-bottom:1px solid var(--cream-3)"><span class="badge b-gold">'+a.hours+' ชม.</span><div class="grow"><b style="font-family:var(--font);font-size:13.5px">'+esc(a.title)+'</b><div class="muted" style="font-size:12px">'+esc(a.type_label)+' · '+TH.date(a.activity_date)+'</div></div></div>';}).join(''):A.empty('heart','ยังไม่มีกิจกรรม',''))+'</div>';
    });
  };

  /* ════════════════ STUDENT SELF ════════════════════════════ */
  Routes['#/me-attendance']=function(){
    setTitle('การมาเรียน','ประวัติการมาเรียนของฉัน');
    call('att.history',{limit:90}).then(function(d){
      var s=d.stat||{};var total=d.total||0;var rate=total?Math.round(((s.present+s.late)/total)*100):100;
      page().innerHTML=hero({pill:'ข้อมูลของฉัน',pill_icon:'calendar-check-fill',title:'การมาเรียนของฉัน',sub:'สถิติการมาเรียนย้อนหลัง',deco:'calendar-check',kpis:[
        {icon:'check-circle-fill',value:num(s.present),label:'มาเรียน'},{icon:'clock-history',value:num(s.late),label:'มาสาย'},
        {icon:'x-circle-fill',value:num(s.absent),label:'ขาดเรียน'},{icon:'percent',value:rate+'%',label:'อัตรามาเรียน'}
      ]})
      +'<div class="tbl-wrap"><table class="tbl"><thead><tr><th>วันที่</th><th>สถานะ</th><th>หมายเหตุ</th></tr></thead><tbody>'
      +(d.items.length?d.items.map(function(a){return '<tr><td data-label="วันที่">'+TH.dateWeekday(a.date)+'</td><td data-label="สถานะ">'+attBadge(a.status)+'</td><td data-label="หมายเหตุ">'+esc(a.note||'-')+'</td></tr>';}).join(''):'<tr><td colspan="3">'+A.empty('calendar','ยังไม่มีข้อมูล','')+'</td></tr>')
      +'</tbody></table></div>';
    });
  };
  Routes['#/me-conduct']=function(){
    setTitle('ความประพฤติ','คะแนนความประพฤติของฉัน');
    call('conduct.history',{}).then(function(d){
      page().innerHTML=hero({pill:'ข้อมูลของฉัน',pill_icon:'award-fill',title:'คะแนนความประพฤติ',sub:'ประวัติการได้รับและถูกตัดคะแนน',deco:'award',kpis:[
        {icon:'award-fill',value:d.score,label:'คะแนนปัจจุบัน'},{icon:'plus-circle-fill',value:num(d.added),label:'ได้รับ'},{icon:'dash-circle-fill',value:num(d.deducted),label:'ถูกตัด'}
      ]})
      +'<div class="card"><div class="card-h"><h3><i class="bi bi-list-check"></i> ประวัติคะแนน</h3></div>'
      +(d.items.length?d.items.map(function(c){return '<div class="flex items-center gap" style="padding:11px 0;border-bottom:1px solid var(--cream-3)"><span class="badge '+(c.type==='add'?'b-ok':'b-danger')+'" style="font-size:14px;padding:5px 12px">'+(c.type==='add'?'+':'-')+c.points+'</span><div class="grow"><b style="font-family:var(--font);font-size:14.5px">'+esc(c.reason)+'</b><div class="muted" style="font-size:12px">'+TH.dateLong(c.date)+' · โดย '+esc(c.recorder_name)+'</div></div></div>';}).join(''):A.empty('award','ยังไม่มีรายการ','คุณยังไม่มีประวัติคะแนนความประพฤติ'))
      +'</div>';
    });
  };

  /* ── small helpers (form) ─────────────────────────────────── */
  function fld(label,id,v,type){return '<div class="field"><label>'+esc(label)+'</label><input class="input" id="'+id+'" type="'+(type||'text')+'" value="'+esc(v==null?'':v)+'"></div>';}
  function sel(cur,v){return String(cur)===String(v)?'selected':'';}
  function val(id){var el=$('#'+id);return el?el.value:'';}
  function money(n){return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2});}

})();
</script>

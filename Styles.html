<style>
:root{
  /* 🔵 Navy Blue (กรมท่า) - Primary Brand */
  --navy: #0A1B3F; 
  --navy-2: #143063; 
  --navy-3: #234B8F; 
  --navy-soft: #F0F4F8; 
  --navy-deep: #050D21;
  --grad-navy: linear-gradient(135deg, #0A1B3F 0%, #143063 100%);
  --grad-navy-soft: linear-gradient(135deg, #F0F4F8, #E2EAF4);

  /* 🟡 Gold (ทอง) - Premium Accents */
  --gold: #D4AF37; 
  --gold-2: #E5C158; 
  --gold-3: #F9F2D6; 
  --gold-deep: #A68A27;
  --grad-gold: linear-gradient(135deg, #C59B27 0%, #D4AF37 55%, #E5C158 100%);
  --grad-gold-soft: linear-gradient(135deg, #FDFBF5, #F9F2D6);

  /* ⚪ White/Grays (ขาว/เทา Apple Style) */
  --cream: #F5F5F7; /* Apple App Background */
  --cream-2: #EBEBF0; /* Apple Secondary Background */
  --cream-3: #E5E5EA; /* Borders/Disabled */
  --line: #D1D1D6; /* Crisp lines */
  --white: #FFFFFF;

  /* Text & Ink */
  --ink: #1D1D1F; /* Apple Standard Text */
  --ink-2: #48484A; /* Secondary Text */
  --muted: #86868B; /* Tertiary Text */
  --muted-2: #AEAEB2;

  /* Status Colors (Apple HIG compliant) */
  --ok: #34C759; --ok-bg: #E8F5E9;
  --warn: #FF9500; --warn-bg: #FFF3E0;
  --info: #007AFF; --info-bg: #E3F2FD;
  --danger: #FF3B30; --danger-bg: #FFEBEE;
  --purple: #AF52DE;

  /* Radii & Shadows (Apple Soft aesthetics) */
  --r-sm: 10px; --r: 14px; --r-lg: 20px; --r-xl: 28px;
  --sh-sm: 0 2px 10px rgba(10, 27, 63, 0.04);
  --sh: 0 8px 30px rgba(10, 27, 63, 0.08);
  --sh-lg: 0 20px 50px rgba(10, 27, 63, 0.12);

  --sb-w: 282px; --ease: cubic-bezier(.25, .8, .25, 1);
  --font: 'Kanit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
  --font-body: 'Sarabun', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}


body{font-family:var(--font-body);color:var(--ink);background:var(--cream);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,h5,.font-display{font-family:var(--font);font-weight:700}
a{color:var(--navy-3);text-decoration:none}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--navy-soft);color:var(--navy-deep)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--cream-3);border-radius:99px;border:2px solid var(--cream)}
::-webkit-scrollbar-thumb:hover{background:var(--navy-3)}

/* ── Splash + Quantum spinner ───────────────────────────────── */
.splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:radial-gradient(1200px 600px at 50% -10%, #FFFFFF, var(--cream))}
.splash-logo{width:84px;height:84px;border-radius:22px;background:var(--grad-navy);display:flex;align-items:center;justify-content:center;color:#fff;font-size:42px;box-shadow:var(--sh-lg);animation:floaty 3s var(--ease) infinite}
.splash-title{font-family:var(--font);font-size:22px;font-weight:800;color:var(--ink);letter-spacing:.3px}
.splash-sub{color:var(--muted);font-size:14px}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.quantum-spinner{position:relative;width:48px;height:48px}
.quantum-spinner.lg{width:64px;height:64px}
.quantum-spinner span{position:absolute;inset:0;border-radius:50%;border:3px solid transparent;border-top-color:var(--navy-2);animation:qspin 1.1s linear infinite}
.quantum-spinner span:nth-child(2){inset:7px;border-top-color:var(--navy);animation-duration:1.5s;animation-direction:reverse}
.quantum-spinner span:nth-child(3){inset:14px;border-top-color:var(--gold);animation-duration:.9s}
@keyframes qspin{to{transform:rotate(360deg)}}

/* ── Global spinner overlay ─────────────────────────────────── */
.spinner-overlay{position:fixed;inset:0;z-index:9000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(245,245,247,.75);backdrop-filter:blur(10px)}
.spinner-overlay.show{display:flex;animation:fade .2s}
.spinner-text{font-family:var(--font);font-weight:600;color:var(--navy)}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* ── Toast ──────────────────────────────────────────────────── */
.toast-host{position:fixed;top:18px;right:18px;z-index:9500;display:flex;flex-direction:column;gap:10px;max-width:min(92vw,380px)}
.toast{display:flex;gap:12px;align-items:flex-start;padding:14px 16px;background:var(--white);border-radius:var(--r);box-shadow:var(--sh-lg);border-left:5px solid var(--navy);animation:toastIn .35s var(--ease);font-size:14px}
.toast .ti{font-size:20px;flex-shrink:0;line-height:1.2}
.toast.ok{border-left-color:var(--ok)} .toast.ok .ti{color:var(--ok)}
.toast.err{border-left-color:var(--danger)} .toast.err .ti{color:var(--danger)}
.toast.warn{border-left-color:var(--warn)} .toast.warn .ti{color:var(--warn)}
.toast.info{border-left-color:var(--info)} .toast.info .ti{color:var(--info)}
.toast b{font-family:var(--font);display:block;margin-bottom:1px}
.toast small{color:var(--muted)}
@keyframes toastIn{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}

/* ── Buttons ────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;border:0;border-radius:12px;font-family:var(--font);font-weight:600;font-size:14px;background:var(--white);color:var(--ink);border:1px solid var(--line);transition:all .2s var(--ease);position:relative;overflow:hidden;white-space:nowrap}
.btn i{font-size:16px}
.btn:hover{transform:translateY(-1px);box-shadow:var(--sh-sm)}
.btn:active{transform:translateY(0)}
.btn-primary{background:var(--grad-navy);color:#fff;border:0;box-shadow:0 8px 20px rgba(10,27,63,.25)}
.btn-primary:hover{box-shadow:0 12px 26px rgba(10,27,63,.35)}
.btn-ghost{background:var(--white);color:var(--ink-2);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--navy-3);color:var(--navy)}
.btn-danger{background:linear-gradient(135deg,#FF3B30,#FF6961);color:#fff;border:0}
.btn-soft{background:var(--navy-soft);color:var(--navy);border:1px solid transparent}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:10px}
.btn-icon{padding:9px;width:40px;height:40px;border-radius:11px}
.btn-block{width:100%}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
.btn .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);transform:scale(0);animation:ripple .6s var(--ease);pointer-events:none}
@keyframes ripple{to{transform:scale(3.4);opacity:0}}
/* Multi-state submit */
.btn[data-state] .st{display:none}
.btn[data-state="idle"] .st-idle,.btn[data-state="loading"] .st-loading,.btn[data-state="success"] .st-success,.btn[data-state="error"] .st-error{display:inline-flex;align-items:center;gap:8px}
.btn[data-state="loading"]{pointer-events:none}
.btn[data-state="loading"],.btn[data-state="success"],.btn[data-state="error"]{opacity:1!important}
.btn[data-state="success"]{background:linear-gradient(135deg,#34C759,#30B753)!important;color:#fff!important;border:0}
.btn[data-state="error"]{background:linear-gradient(135deg,#FF3B30,#FF6961)!important;color:#fff!important;border:0}
.spin-inline{width:15px;height:15px;border:2px solid rgba(255,255,255,.5);border-top-color:#fff;border-radius:50%;animation:qspin .7s linear infinite;display:inline-block}

/* ── Login screen (Apple Split) ────────────────────────────── */
.login{min-height:100vh;display:grid;grid-template-columns:1.05fr .95fr;background:var(--cream)}
.login-brand{position:relative;background:var(--grad-navy);color:#fff;padding:56px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden}
.login-brand::before{content:"";position:absolute;inset:0;background:radial-gradient(700px 360px at 80% 10%,rgba(255,255,255,.15),transparent 60%),radial-gradient(560px 360px at 10% 90%,rgba(255,255,255,.08),transparent 55%)}
.login-brand .lb-beam{position:absolute;top:-30%;left:-10%;width:60%;height:160%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);transform:rotate(18deg);animation:beam 7s var(--ease) infinite}
@keyframes beam{0%,100%{transform:translateX(-30%) rotate(18deg)}50%{transform:translateX(120%) rotate(18deg)}}
.lb-top{position:relative;z-index:1}
.lb-logo{width:72px;height:72px;border-radius:20px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:38px;border:1px solid rgba(255,255,255,.25);margin-bottom:26px}
.lb-title{font-family:var(--font);font-size:38px;font-weight:800;line-height:1.15;margin-bottom:14px;text-shadow:0 2px 18px rgba(0,0,0,.15)}
.lb-desc{font-size:16px;opacity:.9;max-width:460px;line-height:1.7}
.lb-feats{position:relative;z-index:1;display:grid;gap:14px;margin-top:30px}
.lb-feat{display:flex;gap:14px;align-items:center;font-size:15px}
.lb-feat i{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid rgba(255,255,255,.2)}
.lb-foot{position:relative;z-index:1;font-size:13px;opacity:.75;display:flex;align-items:center;gap:8px}
.login-form{display:flex;align-items:center;justify-content:center;padding:40px}
.lf-card{width:100%;max-width:420px}
.lf-head{text-align:center;margin-bottom:28px}
.lf-head .ic{width:64px;height:64px;border-radius:18px;background:var(--navy-soft);border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;font-size:30px;color:var(--navy);margin-bottom:14px}
.lf-head h2{font-size:26px;color:var(--ink)}
.lf-head p{color:var(--muted);margin-top:4px}
.field{margin-bottom:16px}
.field label{display:block;font-family:var(--font);font-weight:500;font-size:13px;color:var(--ink-2);margin-bottom:7px}
.field .inwrap{position:relative}
.field .inwrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:17px}
.input,.field input,.field select,.field textarea{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;font-family:var(--font-body);font-size:15px;background:var(--white);color:var(--ink);transition:all .18s}
.field .inwrap input{padding-left:42px}
.input:focus,.field input:focus,.field select:focus,.field textarea:focus{outline:0;border-color:var(--navy-2);box-shadow:0 0 0 4px rgba(10,27,63,.12)}
.field .eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);cursor:pointer;font-size:18px;background:0;border:0}
.lf-demos{margin-top:24px}
.lf-demos .lbl{text-align:center;color:var(--muted);font-size:12px;margin-bottom:10px;position:relative}
.lf-demo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.lf-demo-card{display:flex;align-items:center;gap:10px;padding:11px;border:1px solid var(--line);border-radius:12px;background:var(--white);text-align:left;transition:all .18s}
.lf-demo-card:hover{border-color:var(--navy-3);box-shadow:var(--sh-sm);transform:translateY(-1px)}
.lf-demo-card .di{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}
.lf-demo-card b{font-family:var(--font);font-size:13px;display:block}
.lf-demo-card small{color:var(--muted);font-size:11px}

/* ── Shell layout ──────────────────────────────────────────── */
.shell{display:flex;min-height:100vh}
.sidebar{width:var(--sb-w);background:var(--white);border-right:1px solid var(--line);position:fixed;top:0;left:0;bottom:0;z-index:200;display:flex;flex-direction:column;transition:transform .3s var(--ease)}
.sb-header{padding:20px 18px;border-bottom:1px solid var(--line);background:var(--grad-navy);color:#fff;position:relative;overflow:hidden}
.sb-header::after{content:"";position:absolute;right:-20px;top:-20px;width:120px;height:120px;background:radial-gradient(circle,rgba(255,255,255,.15),transparent 70%)}
.sb-brand{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
.sb-brand .ic{width:46px;height:46px;border-radius:13px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:24px}
.sb-brand b{font-family:var(--font);font-size:17px;font-weight:700;line-height:1.2}
.sb-brand small{font-size:11px;opacity:.9}
.sb-clock{margin-top:14px;padding:10px 12px;background:rgba(255,255,255,.12);border-radius:12px;position:relative;z-index:1;border:1px solid rgba(255,255,255,.15)}
.sb-clock .t{font-family:var(--font);font-size:24px;font-weight:700;letter-spacing:1px}
.sb-clock .d{font-size:12px;opacity:.85}
.sb-nav{flex:1;overflow-y:auto;padding:14px 12px}
.sb-group{margin-bottom:6px}
.sb-group-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-2);padding:12px 12px 6px;font-weight:600}
.sb-item{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:12px;color:var(--ink-2);font-family:var(--font);font-weight:500;font-size:14.5px;transition:all .16s;cursor:pointer;margin-bottom:2px;position:relative}
.sb-item i{font-size:19px;width:24px;text-align:center;color:var(--muted)}
.sb-item:hover{background:var(--cream-2);color:var(--navy)}
.sb-item:hover i{color:var(--navy-3)}
.sb-item.active{background:var(--navy-soft);color:var(--navy);font-weight:600}
.sb-item.active i{color:var(--navy)}
.sb-item.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:4px;border-radius:0 4px 4px 0;background:var(--navy)}
.sb-item .badge-dot{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;border-radius:99px;padding:1px 7px;font-family:var(--font-body)}
.sb-foot{padding:14px;border-top:1px solid var(--line)}
.sb-user{display:flex;align-items:center;gap:11px;padding:10px;border-radius:12px;background:var(--cream-2);cursor:pointer;transition:all .18s}
.sb-user:hover{background:var(--cream-3)}
.avatar{border-radius:50%;object-fit:cover;background:var(--grad-navy);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font);font-weight:700;flex-shrink:0}
.sb-user .avatar{width:42px;height:42px;font-size:16px}
.sb-user b{font-family:var(--font);font-size:14px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user small{color:var(--muted);font-size:12px}

.main{flex:1;margin-left:var(--sb-w);display:flex;flex-direction:column;min-width:0}
.navbar{position:sticky;top:0;z-index:150;background:rgba(255,255,255,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);padding:13px 24px;display:flex;align-items:center;gap:14px}
.nav-burger{display:none;background:0;border:0;font-size:24px;color:var(--ink)}
.nav-title{font-family:var(--font);font-weight:700;font-size:18px}
.nav-title small{display:block;font-weight:400;font-size:12px;color:var(--muted);font-family:var(--font-body)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.nav-clock{font-size:13px;color:var(--ink-2);padding:7px 13px;background:var(--cream);border:1px solid var(--line);border-radius:99px;font-family:var(--font)}
.nav-chip{display:flex;align-items:center;gap:8px;padding:6px 8px 6px 6px;border-radius:99px;background:var(--cream);border:1px solid var(--line);cursor:pointer}
.nav-chip .avatar{width:32px;height:32px;font-size:13px}
.nav-chip b{font-family:var(--font);font-size:13px}
.content{padding:24px;flex:1}
.footer{padding:22px 24px;border-top:1px solid var(--line);background:var(--white);color:var(--muted);font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.footer a{font-weight:600}
.footer .dev{display:flex;align-items:center;gap:9px}
.footer .dev .avatar{width:34px;height:34px;font-size:13px}

/* ── Role chips ─────────────────────────────────────────────── */
.role-chip{display:inline-flex;align-items:center;gap:6px;padding:3px 11px;border-radius:99px;font-family:var(--font);font-size:12px;font-weight:600}
.role-chip i{font-size:13px}
.role-admin{background:#F3E7FB;color:#6A1B9A} /* Purple */
.role-homeroom{background:var(--warn-bg);color:#D97706} /* Gold/Orange */
.role-teacher{background:var(--info-bg);color:var(--info)} /* Blue */
.role-student{background:var(--ok-bg);color:var(--ok)} /* Green */

/* ── Hero + KPI ─────────────────────────────────────────────── */
.hero{position:relative;border-radius:var(--r-xl);padding:30px 32px;color:#fff;background:var(--grad-navy);overflow:hidden;box-shadow:var(--sh-lg);margin-bottom:22px}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(600px 300px at 88% -20%,rgba(255,255,255,.2),transparent 60%),radial-gradient(420px 280px at 0% 120%,rgba(255,255,255,.1),transparent 55%)}
.hero .beam{position:absolute;top:-40%;left:-15%;width:45%;height:180%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);transform:rotate(20deg);animation:beam 8s var(--ease) infinite}
.hero-top{position:relative;z-index:1;display:flex;align-items:flex-start;gap:18px;flex-wrap:wrap}
.hero-pill{display:inline-flex;align-items:center;gap:7px;padding:5px 13px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:99px;font-size:12.5px;font-family:var(--font);font-weight:500;margin-bottom:12px}
.hero h1{font-size:27px;font-weight:800;line-height:1.2;text-shadow:0 2px 14px rgba(0,0,0,.15)}
.hero p{opacity:.9;margin-top:6px;max-width:560px}
.hero-deco{margin-left:auto;font-size:74px;opacity:.15;line-height:1}
.hero-kpis{position:relative;z-index:1;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:22px}
.kpi{background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);border-radius:var(--r);padding:15px 16px;transition:all .25s var(--ease)}
.kpi:hover{background:rgba(255,255,255,.2);transform:translateY(-3px)}
.kpi .k-ic{font-size:20px;opacity:.9;margin-bottom:6px}
.kpi .k-val{font-family:var(--font);font-size:28px;font-weight:800;line-height:1}
.kpi .k-lbl{font-size:12.5px;opacity:.85;margin-top:4px}
.kpi .k-sub{font-size:11px;opacity:.75;margin-top:3px}

/* ── Toolbar / filters ──────────────────────────────────────── */
.toolbar{display:flex;align-items:center;gap:11px;flex-wrap:wrap;background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:13px 15px;margin-bottom:18px;box-shadow:var(--sh-sm)}
.search{position:relative;flex:1;min-width:200px}
.search i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
.search input{width:100%;padding:10px 14px 10px 40px;border:1.5px solid var(--line);border-radius:11px;font-size:14px;font-family:var(--font-body);background:var(--cream)}
.search input:focus{outline:0;border-color:var(--navy-2);background:#fff}
.tb-select{padding:10px 12px;border:1.5px solid var(--line);border-radius:11px;font-family:var(--font);font-size:13.5px;background:var(--white);color:var(--ink-2);cursor:pointer}
.tb-select:focus{outline:0;border-color:var(--navy-2)}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:7px 13px;border-radius:99px;border:1.5px solid var(--line);background:var(--white);font-family:var(--font);font-size:13px;color:var(--ink-2);cursor:pointer;transition:all .16s;display:inline-flex;align-items:center;gap:6px}
.chip:hover{border-color:var(--navy-3)}
.chip.active{background:var(--grad-navy);color:#fff;border-color:transparent}
.view-toggle{display:flex;border:1.5px solid var(--line);border-radius:11px;overflow:hidden}
.view-toggle button{padding:9px 12px;border:0;background:var(--white);color:var(--muted);font-size:16px}
.view-toggle button.active{background:var(--navy-soft);color:var(--navy)}

/* ── Cards & grid ───────────────────────────────────────────── */
.grid{display:grid;gap:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
